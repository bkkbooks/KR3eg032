body:
  text: 卷三暑病方論太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗則惡寒甚加溫針則發熱甚數下之則淋甚趙注此證屬陰陽俱虛脈弦細者陽虛也芤遲者陰虛也所以溫針復損其陰汗之復傷其陽惟宜甘藥補之以解其熱耳即靈樞所謂陰陽俱不足補陽則陰竭補陰則陽脫可以甘藥因是知白虎湯中石膏之甘寒粳米甘草之輔正人參之益元為的對之藥矣雖知母之苦寒為除足陽明及手太陰氣分之熱並可益腎以除煩躁耳舍此其誰與歸太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之方見前周注趙氏引成注一段因表裡不明足以惑疑後人故刪之趙雲此證為令火之氣酷其金肺主氣者也肺傷則氣虛然太陽膀胱屬水主表肺金之子也母虛而子亦不足衛虛表不足由是汗出身熱惡寒內經曰心移熱於肺傳為膈消膈消則渴也皆相火傷肺之所致此可知其要在救肺也石膏雖能除三焦火熱然仲景名白虎者為石膏功獨多於清肺退金中之火是用為君知母亦就肺中瀉火滋水之源人參生津液益所傷之氣而為臣粳米甘草補土以滋金為佐也愚按冬月有寒則能傷人名中寒夏月有熱亦能傷人名中熱此是外來之熱故曰中非即伏寒發出夏必病熱之熱也然而同用白虎者總以所傷在氣則所主在金所病在熱生金者土金生者水金病則我母我子俱病故與伏氣之在少陰發出之由陽明者無異要皆並主一湯全不因冬月之伏與夏月之中為二義也又全不以伏氣之渴與今病之渴為稍異而必主人參也嗚呼聖人於此有意立方無心表異以千古之前自有此理萬世之下自有此悟不意今之學者不知冬月伏氣與暑月中熱同治之旨反當以此湯治傷寒每至投而輒斃光與盞落反疑聖人有未盡善者何可勝悼太陽中暍身熱疼重而脈微弱此以夏熱傷冷水水行皮中所致也一物瓜蒂湯主之一物瓜蒂湯瓜蒂二七個上銼以水一升煮取五合去渣頓服周注脈虛身熱得之傷暑今身熱脈微弱者暍也身體疼痛者水也夏因暑熱以水灌洗而得一物瓜蒂湯吐之常觀仲景暍病惟出三證豈偶然哉舉其端為萬世準繩一者明其表裡俱虛一者言其暍中表之熱而此言水邪郁令火而成中暍也若邪郁令火比類而推其因殆有不可勝言如取風涼者感霧露者食生冷者素有積熱者陰血素虛不勝大熱者宿邪感而動者處陰地者凡此之類皆足以郁其令火為中暍之由或輕或重或表或里或虛或實隨證發現若論治邪退熱較量權衡何可一言盡哉諸集類方論徒多其證聚其方未有明言其脈證屬於何因害於何經用何藥為君以主之何藥為臣以佐之苟不潛心仲景書者吾未信其泛然方證果切病情否也瓜蒂本草謂其主胸腹邪氣皆吐下之此以夏月傷冷水水行皮中而皮中者豈非屬表何乃用是藥去胸中之水乎蓋形寒飲冷則傷肺皮乃肺之合胸中又肺之部內外相應且瓜蒂又治四肢浮腫下水而冷水之在皮中者不惟灌洗得散而飲冷所傷者亦得散於皮中故兩者皆得而用之喻嘉言合論白虎加人參湯瓜蒂湯二方云金匱治暍病止出二方一以白虎加人參專治其熱以夏月之熱淫必僭而犯上傷其肺金耗其津液用之以救肺金存津液也孫思邈之生脈散李東垣之清暑益氣湯亦既祖之矣一以瓜蒂湯專治其濕以夏月之濕淫上甚為熱亦先傷其肺金故外漬之水得以聚於皮間皮者肺之合也用以搐其胸中之水或吐或瀉而出則肺氣得以不壅而皮間之水得以下趨也何後人但宗仲景五苓散為例如河間之通苓散子和之桂苓甘露飲非不得導濕消暑之意求其引伸瓜蒂湯之制以治上焦濕熱而清肺金則絶無一方矣抑知無形之熱傷其肺金則用白虎加人參湯救之有形之濕傷於肺金則用瓜蒂湯救之各有所主也脈理周禹載曰夏日暑濕交蒸人多中暑證與熱病相似首宜以脈辨之夫熱病之脈必盛中暑之脈必虛蓋寒傷形而不傷氣所以脈盛暑傷氣而不傷形所以脈虛然又有弦細芤遲之脈者何也人當暑月必多汗汗多則脈虛此其常也守真曰熱為陽中之至陽以熱傷氣則汗自出病雖為熱脈不能實而反虛弱也若汗出當風閉其汗孔則風與汗濕留泊肌腠脈故弦細或虛風不作鬱熱表虛仍自汗出者脈必芤遲也統而言之曰虛分而言之曰弦細芤遲其不以浮大之脈混入虛脈之中稱為暑病之脈也張鳳逵曰劉復真云暑脈虛而微弱按之無力又脈來隱伏弦細芤遲皆暑脈也脈虛身熱得之傷暑中暍脈虛而微者是也寒病傳經故脈日變溫熱不傳經故脈不變寒病浮洪有力者易治芤細無力者難治無脈者不治若溫熱則不然溫有一二部無脈者暑熱有三四部無脈者被火所逼勒而藏伏耳非絶無也於病無妨攻之亦易醫人一切驚走不知照經用辛寒藥火散而脈起脈起而病愈徒駭何益乎要在辨之詳耳蓋溫熱病發在一二經始終止在此一二經更不傳遞別經者其一二經或洪數則別經弱且伏依經絡調之則洪者平伏者起乃愈徵也昔在萬曆丁未三月間豫寓京師備員太倉庫瘥忽一日吏部同鄉劉蒲亭馳報曰病劇求救豫就其寓吏部同僚諸公環守之已備後事譫語捻衣不寐者已七八日御醫院吳思泉名醫也偕醫數人治之豫診其脈止關脈洪大其餘皆伏乃書方竹葉石膏湯諸公皆驚曰吳等已煎附子理中湯何冰炭如是豫詰之吳曰陽證陰脈故用附子豫曰兩關洪大此陽脈也其餘經為火所伏非陰脈也吳厲聲相爭豫亦動色自任諸公從之一劑甫時即止譫語就寐片時豫視其脈已洪者乎而伏者起諸公相視曰此真張仲景也又用辛涼藥調理痊愈脈證有相合者易知有相左者難知脈明而後可以辨證證真而後可以施藥要在虛心細察不可執已見而以百藥嘗試令命在反掌間也慎之慎之辨寒暑各異張鳳逵曰暑證變幻無常入發難測不可尋思彼暴中之激烈扁鵲不及攦指而投咀久伏之深毒長桑不能隔膚而見臟最為難察而難救已即尋常之感亦難於知覺非若傷寒之有定期定證可據可療者不拘表裡不以漸次不論臟腑冒暑蒸毒從口鼻入者直中心胞經絡先煩悶後身熱行坐近日熏爍皮膚肢體者即時潮熱煩渴入肝則眩暈頑麻入脾則昏睡不覺入肺則喘咳痿躄入腎則消渴非專心主而別臟無傳入也中暑歸心神昏卒倒暑傷肉分周身煩躁或如針刺或有赤腫蓋天氣浮於地表故人氣亦浮於肌表也冒暑入腸胃腹痛惡心嘔瀉伏暑即冒暑久而藏伏三焦腸胃之間熱傷氣而不傷形旬日莫覺變出寒熱不定霍亂吐瀉膨脹中滿瘧痢煩渴腹痛下血等自入肝至此採醫學入門並主治法皆以清內火為主而解表兼之寒之中人乘其虛暑則虛實並中而實更劇蓋氣血強盛之人內已有伏火加之外火炎炎相合故焦灼為甚經虛處寒棲之經實處暑棲之寒凌其弱而暑親其類也又藜藿常被寒惟膏粱獨能御若暑則不問膏粱藜藿而咸能勝之侮之雖廣廈纍冰蕙質生粟輕羅紈綺泠泠玉樹一犯其烈焰詎能卻之乎是以知暑氣之毒盛於寒乃古人專以寒為殺厲之氣而不及暑何也試觀傷寒至七八日方危暑病則有危在二三日間甚至朝發暮殆暮發朝殆尤有頃刻忽作拯救不及者如暑風乾霍亂之類然則暑之殺厲之氣視寒尤甚彰明較著矣且暑證多歧中熱中暍中內中外甚者為厥為風為顛癇即發則泄瀉霍亂乾霍亂積久後發則瘧痢瘡瘍種種病名約有十餘科皆暑為厲則殺厲之氣視寒豈少哉除暴中暴發久伏後發不可度量其餘受發亦有漸次焉蓋盛夏之時熱毒鬱蒸無論動得靜得其初入人也不識不知外之流火與內之陽氣驟遇而爭陽氣不服先昏瞶倦疲及火與氣合氣不能勝火力漸強散為外熱燒灼不已氣耗而血枯故燥渴痞塞腹痛諸惡證作焉此其變化或乍或久人莫自覺醫家亦不能辨至病深而後施治故難速愈宜早辨而早治之則取效速而易愈暑中二陽中暍雖云太陽然亦頗多陽明汗大出微惡寒發熱為太陽面赤大汗煩渴喘急為陽明重者脈或洪大昏瞶不省人事有似熱病但忽輕忽重為異耳太陽五苓去桂加香薷陽明消暑丸常暑平人偶然中暑身熱背惡寒汗出口渴煩躁悶亂痰逆噁心或吐瀉轉筋小便閉澀指頭微寒並宜五苓去桂合益元散脾胃素虛之人上焦不足暑濕鬱蒸肢體困倦頭重心煩飽悶喘促如在煙霧早晚則寒日高則熱此氣血俱虛也宜清暑益氣或清燥湯選用暑天汗出過多風犯汗孔身體重痛肢節麻瞀或渴或不渴或小便黃澀此風鬱汗濕與暑相搏宜益元散加蔥頭動暑遠行勞役大熱而渴陽氣內伏熱舍於腎為水不勝火發熱煩渴氣急喘促日晡病減此脾胃大虛也宜補中益氣去升麻加麥冬五味茯苓澤瀉黃連黃柏之類補益中兼清解漸愈農夫田野及慣力役之人過受燔灼頭角額痛發熱大渴引飲脈洪汗大泄者急作地漿水煎蒼朮白虎湯或年高及虛寒之人不宜用寒涼者竹葉石膏湯稍加熟附子溫而行之或平昔陰虛多火不可用溫者白虎加人參竹葉湯酷暑之時道途卒倒湯藥不便恐氣脫難治急扶陰涼處不可臥濕冷地掬地上熱土放臍腹上撥開作竅令人溺於其中索生薑或蒜搗汁和童便或熱湯灌下外用布蘸榻俟醒後用藥靜暑避暑深堂起居不時汗出煩躁面垢背微惡寒或手足微厥甚則灑然毛聳腠理開則灑灑然寒閉則蒸蒸熱悶乃心胞之火不勝時火故反微惡寒也或坐臥陰涼表虛不任風寒自認外感誤醫發表禍如反掌宜清暑益氣湯涼亭水閣大樹濃陰之下過受涼快為寒所襲頭疼惡寒發熱肢體拘急是亦感寒之類脈必弦緊宜消暑十全散脾氣虛弱汗多惡寒者十味香薷飲過傷飲食泄瀉嘔吐霍亂者六和湯或香薷正氣散中暑亦有無汗脈弦細此雖中暑必過襲陰涼身中陽氣被其所遏所以煩心肌膚火熱無汗非暑邪也宜消暑十全散不可全用表藥暑月腠理易開香薷熱服便能汗出也倘人迎弦緊而氣口反大咳嗽目疼鼻流清涕額與眉稜角痛選奇湯最效夾水傷暑汗出浴起當風或冷水浸澡或坐臥濕地而病非暑傷也人自致之病宜溫散之內傷夾暑暑熱之時恣情房欲兼膏粱與水果雜進致周身陽氣不得伸越脈沉細或弦緊面垢如塵無汗惡寒四肢厥逆拘急或霍亂嘔吐者冷香飲子吐利兼作脈微欲絶或虛浮欲散此為緊病非漿水散不救若冒暑伏熱引飲過多及恣啖生冷致脾胃受寒腹痛嘔泄水穀不分脈沉緊者宜大順散伏暑人受暑熱之毒棲伏三焦腸胃之間久久而發者為伏暑如霍亂吐瀉發於秋間以及瘧痢等證又如昔人云三伏之時以夏曬曝烈日之中隨即收藏於笥火氣未散冬時啓笥觸之遂病明者細詢其因以香薷飲服之立愈伏暑霍亂腹痛泄瀉正氣散身熱足冷勢危者五苓散下來復丹暑風病人忽然手足搐攣者暑風也香薷飲加羌活防風嘔吐加藿香陳皮小便不利加茯苓澤瀉豬苓滑石有痰加姜半夏渴者去半夏加栝蔞根瀉利不止加白朮轉筋加木瓜腹滿身重難以轉側口不仁而面垢譫語遺溺者此熱兼暍也白虎湯更有痛勢重者手足搐攣厲聲呻吟角弓反張如中惡狀亦有先病熱服表散後漸成風者譫語狂呼浪走氣力百倍此暑風也以寒涼攻劫之與陰風不同宜解散化痰不宜汗下日久而脾胃弱者兼溫補暑瘍凡癰疽毒瘡發熱有時晡甚旦止若夏月間有頭面外項赤腫或咽喉腫痛或腿足焮腫長至數寸不能步履人皆疑為毒瘡但頭痛內燥晝夜發熱不止自與瘡毒不同服敗毒散石膏黃連等藥熱證一解赤腫自消全無膿血此名暑瘍與外科毫釐千里者也暑瘵盛暑之月火能爍金不禁辛酒脾火暴甚勞熱躁擾火動心脾令人咳嗽氣喘驟然吐血衄血頭目不清胸膈煩渴不寧即童稚老夫間有此病昧者以為勞瘵不知火載血上非真陰虧損而為虛勞者比也宜四物去芎芍黃連解毒去黃柏二陳以貝母易半夏加桔梗以抑之薄荷以散之麥冬五味以斂之自愈或黃連香薷飲亦可暑瘡暑熱之時有遍身發泡如碗如杯如桃如李晶瑩脆薄中含臭水此濕熱之水泛於肌表也黃連香薷及解毒湯重者內實便祕口疳臭穢涼膈散承氣湯選用外以鮮蓮花瓣貼瘡上周時平復暑痿膏粱富貴之人暑月陽事痿頓醫以溫熱進之誤也濕熱交蒸石金滲潤草木流膏精神虧乏之人時令應之金風一鼓萬類肅然宜黃連解毒合生脈散絞腸沙夏月不頭痛發熱但覺小腹疼痛或心腹俱痛脹痞不能屈伸醫疑生冷過多執為陰證不知皆暑火流注臟腑故先小腹痛遍及心腹宜六和湯清解之或四苓加香薷木瓜紫蘇半夏之類和散之或正氣散或二陳加厚朴炒梔或炒鹽和滾湯探吐痰涎大抵此證以吐法為上若用熱藥去生遠矣霍亂暑氣入腹噁心腹痛上吐下瀉瀉如水注此暑火暴發升降不利清濁不分所瀉者皆五臟之精液宜速止之用五苓散或胃苓湯利小便清暑火甚者桂苓甘露此證有夾食積者醫用下之誤矣不知精液暴涸元氣頓傷當立止之為上按云止者非通因塞用之謂也分陰陽去暑氣則吐利自止矣乾霍亂更有吐瀉無物亦有上下關閉竟不吐瀉者為乾霍亂惟心腹絞痛令人立斃急以炒鹽湯或二陳湯探吐之通則可救即定後周時勿進粒米得食復發慎之慎之集論曰中暑一證不過清心利小便解暑毒補真氣而已即脈來虛弱重者伏匿喘促逆冷卒然昏暈不可用溫此熱傷陰氣用溫則助陽耗陰且冬月脈浮緊浮緩分中風傷寒夏月弦緊傷風弦緩中暑表疏自汗則脈緩表致無汗則脈緊耳世俗不明曰夏月陰氣在內大順為必用之藥夫陰非寒也陽外而陰內耳丹溪云伏陰在內陰字有虛之義作陰冷則誤矣火令之時爍石流金何陰冷之有孫真人用生脈散氣虛可知也古人用大順非謂伏陰本治冰果所傷冷香飲子治陽氣大虛多欲厥逆漿水散治汗多亡陽脈微欲絶其餘不過清暑益氣湯消暑十全散十味香薷飲之類足矣薛氏曰若中暍者乃陰寒之證法當補陽為主先哲多用薑桂附子或云暍字當作暑字看然何不竟用暑字而滋後人之惑耶周禹載曰薛氏本東垣大順散而有此說其乖謬不可勝言草菅人命難逃作俑之罪服藥總法傷寒傷暑溫涼諸證皆邪氣欺正氣也用藥如對敵藥入則邪漸退藥力盡則邪復熾必一服周時即詳勢診脈藥對則日夜連進三五服以邪退病安為主此法惟張長沙傷寒論孫思邈千金方中載之孫云夏月日五夜三服冬月日三夜五服必期病退而後止如禦敵者愈驅逐愈加精鋭蕩平而後班師此萬全之勝算也自宋以後不傳故取效寡而活人之功疏豫用此法屢獲神效李東垣暑傷胃氣論刺志論云氣虛身熱得之傷暑熱傷氣故也痿論云有所遠行勞倦逢大熱而渴則陽氣內伐熱舍於腎腎者水臟也今水不能勝火則骨枯而髓虛足不任身發為骨痿故下經曰骨痿者生於大熱也此濕熱成痿令人骨乏無力故治痿獨取陽明時當長夏濕熱大勝蒸蒸而熾人感之四肢困倦精神短少懶於動作胸滿氣促肢節沉痛或氣高而喘身熱而煩心下膨痞小便黃而少大便溏而頻或利出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲病雖互換少瘥其天暑濕令則一也宜以清燥之劑治之內經云陽氣者衛外而為固也炅則氣泄今暑邪干衛故身熱自汗以黃耆人參甘溫補之為君甘草橘皮當歸甘辛微溫補中益氣為臣蒼朮白朮澤瀉滲利而除濕升麻葛根苦甘平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之以黃柏苦辛寒借其氣味瀉熱補水虛者滋其化源以五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯王宇泰復立清暑益氣變證加減法如心火乘脾乃血受火邪而不能升發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以益真陰如脾胃不足之證須少用升麻蓋升麻乃足陽明太陰引經之藥也使行陽道自脾胃中左遷少陽行春令生萬物之根蒂也更少加柴胡使諸經右遷生髮陰陽之氣以滋春之和氣也如脾虛緣心火亢盛而乘其土也其次肺氣受邪為熱所傷必用黃耆最多甘草次之人參又次之三者皆甘溫陽藥也蓋脾虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損元氣也上喘氣短懶言語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補脾胃中元氣然甘草最少者恐滋滿也若脾胃之急痛並脾胃大虛腹中急縮腹皮急縮者卻宜多用經曰急者緩之之義也若從權治必加升麻以引之恐左遷之邪堅盛卒不肯退反致項上及臀尻肉添而行陰道故引之以行陽道使清氣出地右遷而上行以和陰陽之氣也若中滿者去甘草咳甚者去人參口乾嗌乾者加乾葛如脾胃既虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣伏於地中陰火熾盛日漸煎熬血氣虧少且心胞絡與心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也是由清氣不升濁氣不降清濁相干亂於胸中使周身血氣逆行而亂經曰從下上者引而去之故當加辛溫甘溫之劑生陽陽生而陰長也或曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生陰血也更加當歸和血又宜稍加黃柏以救腎水蓋甘寒瀉熱火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之蓋將補腎水使腎水旺而心火自降扶持地中陽氣也如氣浮心亂則以硃砂安神丸鎮固之得煩減勿再服以防瀉陽氣之反陷也如心中痞亦少加黃連氣亂於胸為清濁相干故以陳皮理之能助陽氣之升而分滯氣又助諸甘辛為用故長夏濕土客邪火旺可從權加蒼朮白朮澤瀉上下散消其濕熱之氣濕氣大盛主食不消化故食減不知穀味加炒曲以消之更加五味子麥門冬人參瀉火益肺氣助秋損也此三伏中長夏正旺之時之藥也按東垣意見精密立方中和清暑益氣湯近世多宗之然氣血虛弱之人用之最宜如遇強壯者不能取效且助濕火不可不斟酌也朱丹溪辨動靜二暑苦暑之時無病之人或避暑熱納涼於深堂大廈涼亭冷館大扇風車得之者是靜而得之陰證也其病必頭痛惡寒身形拘急肢節疼痛而心煩肌膚大熱無汗此為陰寒所遏使周身陽氣不得伸越宜用辛溫之劑以解表散寒用厚朴紫蘇乾葛藿香羌活蒼朮之類若外既受寒內復傷冰水生冷瓜果者前藥再加乾薑縮砂神麯之類此皆非治暑也治因暑而致之病也按靜得動得分中暑傷暑此論出自張潔古後皆因之夫盛暑之時炎火若炙無之非是故古人聞避暑而未聞避寒深堂廣廈正以避暑安得入而中之且房室陰涼正可護衛陽氣又安得而遏傷之乎即膏粱深處必不能無冒暑應接其傷暑者亦於動中得之耳老子曰人能常清靜天地悉皆歸一靜即可祛暑何從而中也至於冰水瓜果等寒物多食自傷脾胃亦生雜證謂瀉利諸證內有此物積聚則可謂專以此致暑病則不可若執口得寒物身犯寒氣同冬時寒病治之則謬以千里矣方古庵論寒則傷形熱則傷氣何以言之人與天地同一橐籥夏月天之氣浮於地表則人之氣浮於肌表況被盛暑所傷膚腠疏豁氣液為汗發泄於外是表裡之氣俱虛矣不善攝生者暑熱傷於外生冷戕於中若之何而能運化也是以水穀停積而為濕熱發為嘔吐為泄瀉甚則吐瀉俱作而揮霍悶亂也若不即病濕熱拂鬱於內他日為瘧為利之所由矣今大順散非治暑熱之藥乃治暑月飲涼過多為病之劑也歟王安道中暑中熱辨潔古云靜而得之為中暑動而得之為中熱中暑者陰證中熱者陽證東垣云避暑熱於深堂大廈得之者名曰中暑其病必頭痛惡寒身形俱急肢節疼痛而煩心肌膚火熱無汗為房室之陰寒所遏使周身陽氣不得伸越大順散主之若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發躁熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼朮白虎湯主之竊謂暑熱者夏之令也大行於天地之間人或勞動或飢餓元氣虧乏不足以御天令亢極於是受傷而為病名曰中暑亦名曰中熱其實一也今乃以動靜所得分之何哉夫中暑熱者固多在勞役之人勞役則虛虛則邪入邪入則病不虛則天令雖亢亦無由以傷之彼避暑於深堂大廈得頭痛惡寒等證者蓋亦感冒微風或靜夜著涼耳不可以中暑名之其所以煩心與肌膚火熱者非暑邪也身中陽氣受外邪所遏而作也既非暑邪其可以中暑名乎苟欲治之則辛溫輕揚之劑發散可也夫大順散一方甘草最多乾薑杏仁肉桂次之除肉桂外其三物皆炒者原其初意本為冒暑伏熱引飲過多脾胃受濕嘔吐水穀不分臟腑不調所立故甘草乾薑皆經火炒熟又肉桂而非桂枝蓋溫中藥也內有杏仁不過取其能下氣耳若以此藥治靜而得之之證吾恐不能解表反增內煩矣今世俗往往不明類曰夏月陰氣在內大順散為必用之藥籲其誤也不亦甚歟夫陰氣非寒氣也蓋夏月陽氣發散於外而陰氣則在內耳豈竟視陰氣為寒氣而用溫熱之藥乎陰果為寒何以夏日則飲冰乎然則蒼朮白虎湯豈可視為通行之藥必參之治暑諸方隨所見之證而用之然後合理若夫所謂靜而得之之證雖當夏月即非暑病宜分出之勿使後人有似同而異之惑附醫案十三則羅謙甫治蒙古百戶因食酒肉飲潼乳得霍亂吐瀉證從朝至午精神昏憒已困急來告羅視之脈皆浮數按之無力所傷之物已出矣即以新汲水半碗調桂苓白朮散徐徐服之稍得安靜又於牆陰掘地約二尺許貯以新水在內攪動待一時澄定用清水一杯再調服之漸漸氣調吐瀉遂止至夜安臥翌日微煩渴遂煎錢氏白朮散時時服良愈或曰用地漿者何也曰坤屬地地屬陰土平曰靜順感至陰之氣又於牆陰貯新汲水以收重陰之氣也陰中之陰能瀉陽中之陽霍亂因暑熱內傷所得故用地漿治之也又治提舉公年近八十至元丙寅六月初四日中暑毒霍亂吐利昏冒終日不省人事時夜方半請羅治之診其脈洪大而有力一息七八至頭熱如火足冷如冰半身不遂牙關緊急因思內經五亂篇中雲清氣在陰濁氣在陽營氣順脈胃氣逆行亂於胸中是謂大悗亂於腸胃則為霍亂於是霍亂之名自此而生蓋因年高氣弱不任暑氣陽不維陰則瀉陰不維陽則吐陰陽不相維則既吐且瀉矣前賢見寒多以理中丸熱多以五苓散為定法今暑氣極盛陽明得時況因動而得之中暍明矣非甘辛大寒之劑則不能瀉其暑熱墜浮溜之火而安神明也遂以甘露散甘辛大寒瀉熱補氣加白茯苓以分陰陽約重一兩冰水調灌漸漸省事而諸證悉去後慎言語節飲食三日以參朮調中湯之劑增減服之理正氣逾十日後方平復又治一倉官季夏時病胸項多汗足逆冷譫語醫者不曉雜治經旬羅診之關前濡關後急當作濕溫治蓋先受暑後受濕暑濕相搏是名濕溫先以白虎加人參湯次以白虎加蒼朮湯病漸退足漸溫汗漸止三日愈此名賊邪誤用藥有死之理心病中暑為正邪中濕得之從所不勝者為賊邪今心受暑而濕邪勝之水剋火從所不勝是也五邪中之最逆也經曰濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣搏暑也小急見於陰部暑氣蒸濕也暑濕相搏名曰濕溫是謂賊邪也豫亦素有停飲之疾每至暑月兩足漐漐未常干服此藥二三服即愈滑伯仁治一人病自汗如雨面赤身熱口燥心煩盛暑中且帷幕周密自以至虛亡陽服朮附數劑脈虛而洪數舌上苔黃伯仁曰前藥誤矣輕病重治醫者死之素問云必先歲氣毋伐天和朮附豈可輕用以犯時令又云脈虛身熱得之傷暑暑家本多汗加之剛劑脈洪數而汗甚乃令撤幔開窗少頃漸覺清爽以黃連人參白虎三進而汗止大半諸證亦減兼以既濟湯渴用冰水調天水散七日而愈丹溪治一人夏發大熱大汗惡寒戰栗不自禁持且煩渴此暑病也脈虛微細弱而數其人好賭致勞而虛以人參竹葉作湯調辰砂四苓散八帖而安又治一人年五十質弱多怒暑月因怒後患痢口渴自引蜜水病緩數日後脈稍大不數朱令以參朮湯調益元散飲之利減數日後倦甚發咳逆知其久下陰虛令守前藥利尚未止以煉蜜與之衆欲用薑附朱謂陰虛服之必死待前藥力到自愈又四日咳逆止利除吳茭山治一婦冬月感病灑灑惡寒翕翕發熱惡食乾嘔大便欲去不去諸醫皆以虛弱痰飲治之以二陳補心等藥服不效延及半月吳診其脈虛而無力類乎傷暑衆不然之究問病因其婦曰因天寒換著綿衣取綿套一床蓋之須臾煩渴寒熱嘔吐延綿至今耳吳曰誠哉傷暑也蓋綿套曬於盛暑夾熱收入笥中必有暑氣尚未開泄今人體虛得之易入故病如是其婦曰然遂制黃連香薷飲連進二服而愈陳鬥嵓治倫司成舟中昏暈不知人自汗瘛瘲醫以為中風陳曰人迎脈過盛病因飲後便涼痰火妄動非中風也以清暑益氣湯一劑而愈汪希說治一壯男子形色蒼黑暑月客遊舟回患嘔噦顛倒不得眠粒米不入六日矣脈沉細虛豁諸醫雜投藿香柴苓等藥不效危殆汪曰此中暑也進人參白虎湯人參五錢服下嘔噦即止鼾睡五鼓方醒索粥連進二三服乃減參稍輕調理數劑而愈汪石山治一人年三十餘形體瘦弱病上吐下瀉水漿不入口者七日自分死矣汪診脈八至而數曰當夏而得是脈暑邪深入也吐瀉不納水穀邪氣自甚也宜以暑治遂以人參白虎湯進半杯良久復進一杯覺稍安三服後減去石膏知母以人參漸次加至四五錢黃柏陳皮麥冬等隨所兼病而佐使一月後平復又治一人年三十餘忽病渴熱昏悶面赤倦怠汪診之脈皆浮緩而弱兩尺尤甚曰此得之色欲藥宜溫熱其人曰先生之言誠然也但病熱如此復加熱藥惑矣汪曰寒極生熱此證是也腎虛寒者本病也熱甚者虛象也譬如雷火雨驟而火愈熾日出火斯滅矣遂以附子理中湯煎熟冷服三帖熱渴減半再服清暑益氣湯十帖而安又治一婦形色脆白年五十餘憂勞六月背瘡艾灸百餘壯瘡散病瘧身熱自汗口渴頭暈吐嘔泄瀉不進飲食寒少熱多自用清暑益氣湯病甚汪診左脈浮微似有似無右脈浮小按之不足曰病雖屬瘧當作虛治依方而用清暑益氣湯固與病宜但邪重劑輕病不去耳令以參術加作五錢黃耆三錢茯苓一錢陳皮七分甘草五分煎服病退石山翁年逾六十形質近弱八九月酷熱時往來休歙外有藥劑之勞內有病者之憂內外弗寧晝夜不靜至十月初旬瘧作三日午後一發寒熱不甚喜熱惡寒寒去熱來則覺爽快口乾微渴臨發昏倦嗜臥左脈沉小而數右脈浮濡無力亦近於數獨脾部弦而頗洪瘧去則脈皆大小浮沉相等微覺緩弱而已初服補中益氣湯十餘帖病無加減夜苦盜汗繼服當歸六黃湯黃耆每帖四錢五帖汗止瘧如舊再服白虎湯人參四錢石膏三錢知母一錢甘草六分米一撮煎服十餘帖而愈又治一人病霍亂欲吐不吐欲瀉不瀉心腹絞痛脈之沉伏如無此乾霍亂也急令鹽湯探吐宿食痰涎碗許遂飲與六和湯而愈暑病論周禹載曰仲景本內經病熱之旨申伏氣之論特敘夏月熱病白虎湯之治可謂精矣乃復出暍病於金匱中曰太陽中熱者暍是也正恐人誤認為熱病故又言暍自外來而入熱由內伏而發實為兩途然暑為夏火之令傷人之氣脈虛身熱遂令人大渴齒燥汗出而喘與伏發無異並治以白虎湯俱主甘寒去熱苦寒除火甘溫益中益中者以暑傷氣故益之然津液耗甚者必加人參與辛散溫散之味不相涉也或謂伏發自內白虎宜也中暍既由外而內何為遽用里藥則以風藥略兼表散似無不可愚謂千古之誤正在於此雖夏暑與冬寒對峙而表裡則大不同也冬月腠理密即衛虛而受者必以漸進何也外陰而內陽也若夏月則人身已陽外而陰內外垣既撤暑得直入故風寒必顯有餘有餘者邪也暑氣必顯不足不足者正也今人以香薷一味謂傷暑必用之藥不知乘涼飲冷遏抑陽氣或致霍亂者宜之若強力作勞內傷重者清暑益氣庶幾近之苟用香薷是重虛其虛矣況可以表散辛溫之味加於其間乎計部張鳳逵先生編輯諸書特救其謬我北海林夫子申明大義並集名案以表其後不亦勝任而愈快耶余小子又復為之辨者願以白虎湯為主治清暑益氣輔之亦必隨證加減至於天水散甘露飲諸方皆可引用如節庵之論吾未見其可也設有疑者請觀汗下溫針之禁本於仲景聖人至有夾食而吐利夾氣而脹悶夾寒而厥逆兼風而畏寒要皆本於脈以測識而毋庸混淆然後知聖人之論者常也隨其所遇者變也明其常則善於處經通於變而靡不善於用權者則有昔賢之案在亦惟洞曉傷寒書者可以神而明之也暑病方二道白虎加人參湯一物瓜蒂湯方俱見前附集方二十九道五苓去桂加香薷湯豬苓茯苓澤瀉白朮香薷上五味等分水煎服無時消暑丸半夏十二兩醋煮乾生甘草茯苓各四兩去皮上為末薑汁煮糊丸如桐子大每服二錢熱湯下香薷飲厚朴制白扁豆各半斤炒香薷一斤上㕮咀每服五錢水一鍾入酒一杯煎七分沉冷不拘時服熱則作瀉香薷須陳者佳桂苓甘露飲茯苓去皮白朮土炒豬苓去皮滑石各二兩研寒水石研甘草炙澤瀉各一兩肉桂三錢上為末每服二錢熱湯冷水任下入蜜少許更妙一方加人參香薷甘草益元散方見前清暑益氣湯人參一錢白朮五分炒黃耆一錢蒼朮一錢升麻一錢神麯五分炒陳皮五分甘草五分當歸五分麥門冬五分去心黃柏五分五味子三分葛根三分澤瀉三分青皮三分上水煎溫服無時清燥湯黃耆一錢五分五味子九粒黃連神麯豬苓柴胡甘草各二分蒼朮白朮麥門冬陳皮生地黃人參澤瀉各五分茯苓當歸升麻各三分黃柏二分酒拌上水煎服無時白虎加蒼朮湯竹葉石膏湯二方俱見前白虎加人參竹葉湯即前白虎湯加人參三兩竹葉二把消暑十全散香薷二錢白扁豆炒捶厚朴薑汁炒木瓜陳皮一作半夏甘草炙白朮薑汁炒茯苓藿香蘇葉各一錢上水煎熱服無時取微汗十味香薷飲香薷二錢人參黃耆白朮茯苓各一錢甘草五分炙白扁豆陳皮厚朴各一錢姜炒木瓜五分上以水二鍾煎七分欲令汗熱服欲利水冷服如伏暑去人參黃耆加黃連藿香澤瀉六和湯縮砂仁炒研半夏湯泡七次杏仁去皮尖人參去蘆甘草各一兩炙赤茯苓去皮藿香白扁豆薑汁略炒木瓜各二兩香薷厚朴各四兩薑汁製上㕮咀每服一兩水二鍾生薑三片棗一枚煎一鍾溫服藿香正氣散大腹皮黑豆水洗七次白芷茯苓去皮白朮土炒厚朴薑汁炒桔梗紫蘇葉甘草各一兩炙藿香陳皮各三兩去白半夏二兩湯洗七次上㕮咀每服一兩水二鍾姜三片棗一枚煎一鍾溫服選奇湯羌活一錢五分防風一錢甘草一錢五分夏生冬炙黃芩一錢酒炒熱甚倍用上水煎食後稍熱服冷香飲子附子生用草果橘紅甘草各一錢炙生薑五片上水煎冷服漿水散附子乾薑炮甘草炙肉桂各五錢高良薑半夏各二錢半醋製上用漿水煎去滓冷服漿水即點乳酪淡醋也如虛熱喘乏加人參汗多加黃耆五味子大順散甘草乾薑各五錢杏仁去皮尖官桂各三錢上先將甘草用白砂炒次入姜卻下杏仁炒過篩去砂合桂為末每服三錢沸湯調下黃連香薷散香薷二錢厚朴一錢薑製黃連五分酒蒸上水煎冷服加減瀉黃散黃連茵陳各五分黃柏黃芩各四分茯苓梔子各三分澤瀉二分上㕮咀都作一服水一大盞煎至六分去滓食前稍熱服一服減半待五日再服二香散藿香一兩半夏薑製陳皮桔梗白朮土炒茯苓蘇葉厚朴薑汁炒黃連各二兩去須香薷一斤白扁豆八兩炒白芷一兩甘草二兩五錢大腹皮黑豆水捶洗七次上㕮咀每服一兩水二鍾生薑三片蔥白二根煎一鍾食後溫服枇杷葉散枇杷葉二兩去毛炙香薷七錢五分白茅根麥門冬去心甘草炙木瓜各一兩丁香陳皮去白厚朴各五錢去皮薑汁炒上為末每服二錢水一鍾生薑三片煎服如止渴燥去丁香加知母冷水調下百合湯百合一錢二分人參五分去蘆柴胡一錢去蘆黃芩一錢知母八分去毛陳皮一錢去白甘草五分生地七分上㕮咀水二鍾姜三片捶法醋炙鱉甲煎之溫服如渴加栝蔞根胸中煩熱加山梔頭痛加羌活川芎嘔吐加姜炒半夏胸滿加枳殼桔梗食復者加枳實黃連甚重大便實者加大黃胸中虛煩加竹茹竹葉瘥後乾嘔錯語失神呻吟不寐加黃連犀角咳喘加杏仁血少心中驚惕加當歸茯神遠志虛汗加黃耆疲倦加白朮腸鳴加煨生薑勞復時熱不除加葶藶烏梅薑汁加味胃苓丸蒼朮五兩陳皮三兩厚朴二兩甘草二兩炙白朮四兩茯苓二兩肉桂二兩豬苓二兩澤瀉二兩去毛人參一兩去蘆黃連一兩薑汁炒白芍二兩炒上為末蜜丸每服五六十丸清米湯下黃龍丸黃連二斤去毛上以好醋煮乾為末麵糊丸桐子大每服三十丸熱湯下玉露散寒水石滑石去黃垢土石膏火煅栝蔞根各二兩甘草一兩上為細末每服五錢新汲水調下卻暑散赤茯苓四兩寒食麵生薑各一斤甘草四兩生上為末每服二錢白湯調下傷暑霍亂轉筋危急方吳茱萸三錢同黃連炒至煙起方取去黃連將茱萸煎湯一大盞溫服香連丸木香二兩陳皮二兩地榆一兩枳殼二兩麩炒黃連八錢吳茱萸炒枳實一兩麩炒檳榔二兩槐角子一兩五錢益元散二兩上為末醋糊丸每服一錢紅痢米湯下白痢薑湯下或白湯下日三服或湯一丸二亦可老弱數服後即當溫補
