body:
  text: 卷二熱病方論傷寒脈浮滑此表有熱里有寒白虎湯主之方注浮者風也言不獨傷於寒也滑為裡熱以滑且浮知熱不獨在裡也故指言此表有熱蓋表裡俱熱之謂也里有寒者里字非對表而稱以熱之裡言蓋傷寒之熱本寒因也故謂里有寒指熱之所以然者言也夫表裡皆熱欲兩偕而解之誠哉極其難也譬如夏秋兩屆之間燥熱酷甚非金風之薦涼則毒暑不解也又注世本作表有熱里有寒必系傳寫之誤夫白虎本為治熱病暑病之藥其性大寒安得里有寒者可服之理詳本文脈浮滑不但無緊且復多滑乃陽氣盛而鬱蒸此里有熱也裡熱甚必格寒於外多厥逆身涼而為亢害之證此表有寒也厥陰篇中脈滑而厥者里有熱也白虎湯主之則知此表裡二字為錯誤可知當為上下更易周注熱病皆傷寒伏邪也至發則但熱矣乃仲景仍以傷寒揭之者所謂樂樂其所自生禮不忘其本也白虎湯知母六兩石膏一斤碎甘草二兩粳米六合上四味以水一斗煮米熟湯成去滓溫服一升日三服方注白虎者西方之金神司秋之陰獸虎嘯穀風冷涼生酷暑消神於解熱莫如白虎知母石膏辛甘而寒辛者金之味寒者金之性辛甘且寒得白虎之體焉甘草粳米甘平而溫甘取其緩溫取其和緩而且和得伏虎之用焉飲四物之成湯來白虎之嗥嘯陽氣者以天地之疾風名也風行而虎嘯者同氣相求也虎嘯而風生者同聲相應也風生而熱解者物理必至也抑嘗以此合大小青龍真武而論之四物者四方之通神也而以命名蓋謂化裁四時神妙萬世名義兩符實自然而然者也方而若此可謂至矣然不明言其神而神卒莫之掩者君子盛德此其道之所以大也三陽合病腹滿身重難以轉側口不仁而面垢譫語遺溺發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之周注此因中暍而引動伏邪齊出三陽為病極重腹滿者熱本病也身重難以轉側者濕本病也若口不仁而面垢譫語遺溺則是暍本病矣惟熱暍相兼其熱勢尤劇此時倘復汗之則津液外亡而譫語轉甚若下之則陰氣下竭而陽氣上脫故額上汗而手足逆冷矣故必仍自汗者主以白虎設誤汗下而證如上者加人參為無疑也傷寒脈滑而厥者里有熱也白虎湯主之周注滑為邪實何反至厥即熱深厥深之義故特申之曰里有熱也裡熱安得不用白虎湯乎傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之周注發熱汗出熱本病也今脈浮無汗必因邪風襲表矣豈可竟與白虎湯乎故必以辛涼先撤其邪然後治熱始為無礙假使表邪解而煩渴轉甚者明系因邪以更耗津液白虎湯固非解表之劑又豈有助正之功加人參者益其元也元稍益而熱易清矣傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之周注燥渴且煩為熱證本病而曰無大熱者以獨背微惡寒也背為太陽經位正氣大虛故微惡寒安得不用補正之藥於本湯中乎陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔滑者梔子豉湯主之方見前若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之周注浮緊傷寒脈也何以為熱病以其發於夏反惡熱不惡寒也又何以獨言陽明以夏時濕熱上蒸邪從胃發且腹滿而喘種種皆陽明證也然咽燥非少陰證耶不知陽明為從出之途少陰其伏臟之地也夫既陽明熱病曷又為脈反浮緊正以夏時肌腠本開人本多汗邪風襲入致腠理反閉而無汗故夏之風脈每反顯冬之寒脈也今云汗出而脈亦浮緊者正因浮甚有力熱邪盛而致也若不知者以辛熱汗之耗其津液必至躁妄昏昧火劫溫針燥其陰血必至驚擾無寐下之必亡其陰必至胃虛邪陷心中懊憹此皆誤治將何以救之乎觀舌上苔滑者則外邪尚在以梔子解熱香豉去邪是為合法若渴飲水漿口乾舌燥知其外邪亦入總以白虎湯為治加人參者以誤治而津液大傷也設使緊脈去而浮在發熱飲水小便不利則其浮為虛而熱已入膀胱矣入膀胱者曷不飲以四苓而主以豬苓耶傷寒之小便不利結於氣分熱病之小便不利由於血分者也因邪郁既深耗液日久故必以阿膠補虛滑石祛熱而無取於白朮也白虎加人參湯知母六兩石膏一斤碎甘草二兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服周注口至干舌至燥無津液極矣能生津液而神速者莫若人參故加之豬苓湯豬苓一兩去皮茯苓一兩阿膠一兩滑石一兩碎澤瀉一兩上五味以水四升先煮四味取二升去滓內下阿膠烊消盡溫服七合日三服周注熱甚膀胱非水能解何者水有止渴之功而無祛熱之力也故用豬苓之淡滲與澤瀉之鹹寒與五苓不異而此易白朮以阿膠者彼屬氣此益血也易桂以滑石者彼有表而此為消熱也然則所蓄之水去則熱消矣潤液之味投則渴除矣陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯複利其小便故也周注渴而小便不利本當用豬苓湯然汗多在所禁也此與傷寒入腑不令溲數同意蓋邪出陽明已劫其津汗出復多更耗其液津液曾幾尚可下奪耶當以白虎加人參去其熱則小便之不利者津回而自利矣傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之周注吐下後至七八日不解知誤治而熱邪不為吐下少衰反因吐下轉甚時惡風者陽外虛也舌燥而煩渴飲水至數升者陰內亡也舍人參白虎將何以解其表裡補其津液耶服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之周注桂枝辛熱藥也熱病本汗或疑為風飲以此湯不更益其熱而大汗淋漓乎如是則津液益傷煩渴益甚洪大轉增當與本湯加人參也審矣夏熱集補證治並方交夏至後炎暑司令相火用事人有發熱身疼不惡寒但大熱而大渴者為熱病仲景以白虎湯為主治今人以此湯治傷寒者誤也熱病下發上內發外必經陽明故無論三陽總以石膏之辛涼乘勢升散知母之苦寒靖少陰伏邪之源甘草粳米維持中氣一了百當至傷寒既非其時復非其病邪自外來未入者解表已入者下奪石膏本非表藥又非下藥即欲解熱熱何從解況有知母引入少陰為害不淺理自如此達者自會愚不敢好與今人辯也故除以上見證正方外補集方治一法熱病之脈本洪大若見浮緊是又感夏時暴寒謂輕舉見緊略按則仍洪盛以內伏已發也治宜通解散去麻黃蒼朮或加蔥白香豉或先以連須蔥白香豉湯減生薑撒其外後用白虎加人參湯一法熱病凡客邪所感不論脈浮緊惡風惡寒宜解不宜下者通用雙解散去硝黃於中加減如去白朮芍藥桔梗二三味加知母蔥豉最妥一法凡溫病之發因暴寒者居多熱病之發兼暑暍者為盛若始病見譫語面垢遺溺背微惡寒者白虎加人參湯一法若本病兼衄於本湯中加生地黃牡丹皮喘加栝蔞根厚朴杏子仁一法若惡熱煩渴腹滿舌黃燥或黑干五六日不大便涼膈散或三一承氣湯一法若本病兼暑濕者或涼膈合天水散若小便不利者竹葉石膏湯倍石膏一法若兼風痰者用雙解散煎一大豌先飲半作探吐法以引痰出外再盡劑微以被覆令汗出解蓋用涼藥熱飲發汗百無一損也河間制雙解散子和演為吐法甚妙一法誤用辛溫藥致發斑譫語喘滿昏亂者黃連解毒湯加減一法屢下後熱勢猶盛不便再下或諸濕內盛小便黃澀大便溏小腹痛者欲作利也宜黃連解毒湯總論溫熱死脈死證周禹載曰內經刺熱云太陽之脈色榮顴骨營未交曰今且得汗待時而已與厥陰爭見者死期不過三日其熱病內連腎少陽之脈色榮頰前熱病也營未交曰今且得汗待時而已與少陰脈爭見者死太陽之脈色屬赤初起時其色止榮顴骨一處不交他處純是赤色曰今且得汗者謂邪勢漸從外解即餘證未靖少待而自解言無害也至於厥陰爭見者死不外三日是為交已熱病大熱煩渴汗出反見厥陰肝經之脈色爭見赤紫晦滯已為主死況爭見青黑之色耶何者少陽青色少陰黑色也爭見者命期甚促矣又評熱病論云帝問曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何夫帝既曰病溫矣復曰病名為何者正欲知病之本於陰陽也岐伯曰名陰陽交交者死何也交則不解也謂人所以汗出者生於精氣也精氣者穀氣也邪正交爭而得汗者是邪退而精氣勝也精氣勝則能食而不復熱復熱者邪勝則是汗出不為汗衰也不能食者精無俾也病而留其壽可立而傾也故熱病曰汗出脈尚躁盛者死脈既不與汗應此不勝病矣其死必矣狂言者是失志失志者死今見三死不見一生雖愈必死也此段論溫獨創穀氣之旨穀氣為精精氣為汗故藏精者不病溫其病溫者咸不藏精之人也而有生有死者不藏精甚與不甚之分也二陽搏病溫者死不治雖未入陰不過十日死二陽者手足陽明也溫病發於三陰脈微足冷者難治溫病大熱脈反細小手足逆冷者死溫病初起大熱目昏譫語脈小足冷五六日而脈反躁急嘔吐昏沉失血痙搐舌本焦黑脈促結代沉小者皆死溫病汗後反熱脈反盛者死溫病誤發汗狂言不能食脈躁盛者皆不治以上春溫死證熱病七八日脈微小溲血口中乾一日半而死脈代者一日死熱病七八日脈不躁或躁不散數後三日中有汗三日不汗四日死熱病已得汗脈尚躁喘且復熱喘甚者死熱病不知痛處耳聾不能自收持口乾陽熱甚陰頗有寒者熱在髓死不治熱病汗不出大顴發赤噦者死熱病泄甚而腹愈滿者死熱病目不明熱不已者死熱病汗不出嘔吐下血者死熱病舌本爛熱不止者死熱病咳而衄汗出不至足者死熱病熱而痙者死腰折瘛瘲齒噤齘也以上夏熱死證附濕溫活人書云先傷於濕又中於暑名曰濕溫許學士云先受暑後受濕所言先後感受不同然濕病則緩暑中則速由斯以推先濕後暑者為確也其證兩脛逆冷胸滿頸目痛妄言多汗蓋濕得暑邪遏抑陽氣故脛冷而腹滿暑挾濕邪鬱蒸為熱故頭痛妄言多汗其脈陽濡而弱陰小而急許學士以關前為陽關後為陰紀氏以浮為陽沉為陰羅謙甫云濡弱見於陽部濕摶暑也小急見於陰部暑摶濕也然濕傷血則必小急暑傷氣則必濡弱於此加浮為陽沉為陰者當矣切不可發汗汗之名重暍死治宜白虎加蒼朮湯如有寒熱外邪加辛涼表藥一二味若濕氣勝一身盡痛小便不利大便反快者加茵陳香薷若有寒物停滯及中寒宜溫必小便清白然後可如赤澀而少斷不可用通宜十味香薷飲清暑益氣合天水散王宇泰云昔人治濕溫通身皆潤足冷至膝下腹滿不省人事六脈皆小弱而急問所服藥皆陰病藥也此非受病重藥能重病耳以五苓合白虎十餘劑少蘇更與清燥湯調理而安凡陰病厥冷兩臂皆冷今脛冷臂不冷則非下厥上行故知非陽微寒厥而合用祛熱藥也附陽毒發斑陽邪亢極遂成陽毒亦有誤以辛熱與之而成者金匱云陽毒為病面赤斑斑如錦紋咽喉痛唾膿血五日可治七日不可治升麻鱉甲湯主之虛熱熾甚毒不化者陽毒升麻湯大便結去射干加酒大黃熱甚去人參加大青或吐下未當陷邪內甚其證壯熱頭項強痛躁悶不安或狂言罵詈妄見妄言或面生斑紋口吐膿血或舌卷焦黑鼻如煙煤或下利黃赤六脈洪大而數犀角黑參湯黃連解毒湯慎不可用下藥也勢甚者以青布漬冷水搭病人胸膛必喜熱即易之須臾得睡附陰毒發斑有陰熱亢極而成陰毒者金匱云陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲去雄黃蜀椒主之活人用本方加桂枝名陰毒甘草湯復有陰寒極盛而成陰毒者自是兩種不可混也惟陰寒至極反大熱躁渴四肢厥逆脈沉細而疾或尺部短而寸口大額上手背冷汗不止或因入房而後著寒或內傷生冷而犯房室內既伏陰復加外寒積寒伏於下微陽消於上遂成陰盛格陽陽氣上脫之候後五六日胸前發出紅斑其色淡其點小是為陰斑雖盛夏宜附子理中湯甚至身重眼睛疼額冷汗出嘔噦呃逆或爪甲青或腹絞痛或面赤足冷厥逆躁渴不欲飲身發青黑色斑目鼻灰色舌黑而卷莖與囊俱縮脈沉細而遲或伏而不出或疾至七八至而不可數者急用蔥餅於臍上熨之隨用附子散或人參三白湯合四逆湯熨後服湯已手足不和暖者不治劉守真曰世俗所言陰毒皆陽熱亢極蓄熱深於內身表似有陰寒此特指仲景升麻鱉甲湯去雄黃蜀椒陰熱亢極之證若後世所言陰寒極盛之陰毒非用回陽退陰之藥內溫正氣逼邪外出烏能起死回生耶王安道曰陰陽二毒與陰陽二證迥異仲景書雖有陰毒之名其所敘證不過面目青身如被杖咽喉痛而已並不言陰寒極盛之證也沉所治之方不過升麻甘草當歸鱉甲而已並不用大溫大熱之藥故知仲景所謂陰毒非陰寒之病乃是感天地惡毒之氣入於陰經故名陰毒而非純陰冱寒可用熱藥之比也趙以德曰按古方書謂陽毒者陽氣獨盛陰氣暴衰內外皆陽故成陽毒陰毒者陰氣獨盛陽氣大衰內外皆陰故成陰毒二者或傷寒初得便有是證或服藥後變而成者陽毒治以寒涼陰毒治以溫熱藥劑如冰炭之異何仲景以一方治之乎且治陰毒去雄黃蜀椒則反去其溫熱者矣豈非一皆熱毒傷於陰陽二經乎在陽經絡則面赤如錦紋唾膿血在陰經絡則面青身如被杖此皆陰陽水火動靜之本象也其曰七日不可治者陰陽之津氣血液皆消減矣傷寒七日經氣已盡而此加之以毒至七日不惟消滅其陰且火抑亦自減矣夏熱病論周禹載曰冬傷於寒夏必病熱則是熱病與春溫對峙而非夏時所感之熱也乃嘉言尚論天之六氣春秋冬各主一氣獨夏月兼主三氣謂為痙濕暍者此仍是氣感之證而非伏藏之寒至夏始發之熱也故人素有伏氣將發復感濕暍者言之若但病痙濕暍不得即謂之熱病也故熱病自內發出不論兼見何經必由陽明並無表證其有表者必外受風邪不得遽投白虎亦必先撤外邪而後本湯可用此亦先表后里之法也又曰熱病即伏寒也彼冬傷於寒發於春為溫病發於夏為熱病何彼發於春此發於夏耶蓋感之輕重不同人之強弱亦異而觸發亦異有因飢飽力役者有因房室勞傷者故春時雖行風木之令使氣血不致大虧感觸亦有先後不即發也至夏則陽氣盡泄火令大行正屬濕土寄旺爾時邪烏肯伏故其發源皆自少陰熱病由出之途自陽明溫病由出之途自少陽雖所合之經不一要不離乎陽明少陽者各因時令之氣也但為日既遲為熱愈熾此仲景所以用石膏升涼胃熱以知母盪滌腎伏用甘草粳米維持中氣也名湯曰白虎者白屬金屬涼風從虎且猛人逢悶熱煩躁無可奈何之際忽然狂風薦至偃草揚波火輪火樹不頓成清涼世界而稱快乎熱病方四道白虎湯白虎加人參湯梔子豉湯豬苓湯方俱見前附集方一十八道通解散麻黃去節酒洗石膏碎滑石黃芩各二兩蒼朮四兩去皮泔水浸炒甘草一兩五錢炙上為末每服半兩加姜三片水煎溫服取汗陶節庵方加羌活川芎蔥白香豉蔥白香豉湯蔥白七莖連須香豉一合勿炒生薑一片上三味水煎日三服覆取微似汗不汗加蘇葉雙解散承氣湯涼膈散天水散即益元散四方俱見前竹葉石膏湯竹葉二把石膏一斤麥門冬一升去心人參三兩半夏半升洗甘草二兩炙粳米半升上七味以水一斗煮取六升去滓內粳米煮米熟湯成去米溫服一升日三服黃連解毒湯方見前白虎加蒼朮湯即前白虎湯加蒼朮二兩十味香薷飲清暑益氣湯二方見後暑病金匱升麻鱉甲湯升麻二兩鱉甲手指大一片炙當歸一兩甘草二兩雄黃半兩研蜀椒一兩炒去汗上六味以水四升煮取一升頓服之老小再服取汗陰毒去雄黃蜀椒陽毒升麻湯升麻犀角各一錢半射干黃芩人參甘草各一錢上水煎溫服溫覆手足汗出則解不解再作陰毒甘草湯即前升麻鱉甲湯去雄黃蜀椒加桂枝犀角黑參湯方見前附子理中湯人參白朮甘草炙乾薑各三兩附子一枚炮上五味以水八升煮取三升去滓溫服一升日三服附子散附子七錢五分炮桂心當歸白朮各五錢乾薑炮半夏各二錢五分洗上為散每服三錢加生薑三片水煎溫服暖覆取汗不汗再服人參三白合四逆湯人參二錢五分白朮蒸炒白茯苓白芍藥各一錢五分生薑三片大棗三枚去核乾薑附子炮甘草各一錢炙上九味水煎冷服
