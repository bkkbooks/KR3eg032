body:
  text: 卷四疫病方論吳又可曰疫癘之邪從口鼻而入舍於伏脊之內去表不遠附胃亦近乃表裡之分界即內經瘧論所謂橫連膜原者也其熱淫不正之氣本氣充滿者或不受邪適有內因便乘外因感之淺者或俟有觸而發若感之深者中而即病也其始陽格於內營衛運行之機阻抑於表遂覺凜凜惡寒甚則四肢厥逆至陽氣困鬱而通厥回而中外皆熱昏昧不爽壯熱自汗此時邪伏膜原縱使有汗熱不得解必俟伏邪已潰表氣潛行於內精氣自內達表表裡相通振慄大汗邪方外出此名戰汗脈靜身涼而愈也若伏邪未盡必復發熱其熱有久有淺因所感之輕重也因元氣之盛衰也要皆始先惡寒既而發熱至於發出方顯變證其證或從外解或從內陷外解則易內陷則難更有先後表裡不同有先表后里者有先里後表者有但表而不復里者有但里而不復表者有表而里再表者有里而表再里者有表裡分傳者有表多於里者有里多於表者此為九傳從外解者或發煩或戰汗自汗從內陷者胸膈痞悶心下脹滿腹中痛燥結便秘熱結旁流協熱下利或嘔吐噁心譫語舌黃及黑苔芒刺等證因證用治脈不浮不沉而數晝夜皆熱日晡益甚頭疼身痛不可用辛熱藥汗之又不可下宜用達原飲以透膜原之邪為當也若見各經加入引各經藥不可執滯感之輕者舌苔亦薄脈亦不甚數如此者必從汗解如不能得汗邪氣盤錯於膜原表裡不相通達未可強汗衣被逼汗湯火劫汗也感之重者舌上苔如粉漬藥後反從內陷舌根先黃漸至中央此邪漸入胃也前方用大黃下之若脈長洪而數大汗多此邪氣適離膜原欲表未表白虎湯證也如舌上純黃色兼見里證此邪已入胃乃承氣湯證也有兩三日即離膜原者有半月十日不傳者有初得之四五日厭厭聶聶至五六日陡然勢張者凡元氣勝者毒易傳化元氣薄者邪不易化即不易傳故曰邪與元氣不兩立也倘有他病久虧適又感邪能感而不能化安望其傳不傳則邪不去淹留日久愈沉愈伏因誤進參耆愈壅愈固不死不休也達原飲檳榔二錢草果五分厚朴一錢知母一錢芍藥一錢甘草五分黃芩一錢上七味以水二鍾煎八分溫服疫邪為病有從戰汗解者有從自汗盜汗不解者有無汗竟全歸胃者有自汗淋漓熱渴反甚終得戰汗而解者有胃氣壅抑必從下而得戰汗解者有汗解未盡越三四日前熱復發者有發黃因下而復熱發出斑者有竟從發斑而愈者有里證急雖有斑不愈者此雖傳變不常要亦為常變也又有局外之變者男子適逢使內邪熱乘虛陷於下焦氣道不施以致小便淋塞少腹脹滿至夜發熱以導赤五苓散之類分毫不效與大承氣一服小便如注而愈女子經水適來適斷失血崩帶及心痛疝氣痰火喘哮凡此皆非常變大抵邪行如水惟窪處受之此妙喻也要之新疫而來舊病但治其疫他病自已也疫發一二日舌上苔白如粉早服達原飲一服午後舌色變黃隨見胸膈滿痛大渴煩燥此伏邪之毒傳裡也前方加大黃下之煩熱稍減傍晚復加躁煩發熱通舌變黑刺生鼻如煙煤此邪毒最重復合瘀胃急投承氣湯抵暮大下至夜半熱退次早苔刺如失一日有此三變數日之法一日行之因其毒甚故傳變亦速用藥不得不緊設用緩劑必無救矣每見瘟疫二三日即死者皆此類也疫病初起脈雖數未至洪大其邪尚在膜原宜達原飲若誤用白虎既無破結之能但求清熱是猶揚湯止沸耳邪入胃者非承氣不愈誤用白虎既無奪邪之能徒伐胃氣反抑邪毒致脈不行反變細小倘認陽證陰脈妄言不治因見脈微復不敢下逡巡死耳當此之際惟急投承氣湯庶可救也疫發於半表半裡一定之法也至於傳變出表入里表裡分傳俱未可定醫見有表有里乃引經論先解其表乃攻其里此大謬也嘗見大劑麻黃一毫無汗轉加煩熱者何耶蓋發汗者以邪氣在表故用表藥即得宣其氣而使之出也今邪在裡裡氣結滯陽氣不得即達於表即四肢未免微厥又安能氣勢蒸蒸而達乎外譬之水注閉其後竅則前竅不得涓滴與此欲汗之義相類故必承氣解其里裡氣一通不待發散多有自汗而解者其義可知也設下後脈浮而微數身微熱神思不爽此邪熱浮於肌表而里已無滯也再與白虎湯則餘熱復得清散外即蒸蒸汗解仍此意也若下後脈空而數按之豁然如無宜白虎加人參湯覆杯即汗解下後脈數而浮原當汗解遷延五六日脈證不改仍不得汗者以其反復數下致血液枯正氣微故也用白虎加人參湯以涼解中外鼓舞元氣開泄腠理即得汗而解也里證脈沉而數當下之下之當得汗解脈改浮矣今不得汗二三日脈更沉者膜原之邪仍瘀到胃也更宜下之或脈浮即與白虎湯里證下後熱退身涼越幾日復熱者非關飲食勞復乃膜原之餘邪復聚醫者不知每歸咎於病者誤也仍下之為當但製劑宜輕耳應下失下口燥舌乾而渴身反熱減四肢時厥欲得被近火此陽氣伏也既下厥回脈大而數舌上生津不思水飲此里邪去而鬱陽暴伸也宜柴胡清燥湯去栝蔞根知母加葛根隨其性而升泄之柴胡清燥湯白芍藥當歸生地黃陳皮甘草竹心燈心栝蔞根知母柴胡上九味水煎溫服溫病下後二三日舌上覆生苔刺邪未盡也再下之苔刺雖去而煩熱未除更下之熱渴已減日後更復熱復苔者更下之不以數計總之有是證則用是藥耳醫者經歷未到中道生疑往往失治但其中有間日一下者有連下三四日者有下二日間一日者其後輕重緩急有應用柴胡清燥湯者有用犀角地黃湯者至投承氣何日多與少與亦皆治法苟或不明亦足誤事然數下之證亦僅見也疫病下後脈證俱平腹中有塊按之則痛自覺有所阻而微悶或時升降之氣往來不利常作蛙聲此邪氣已盡其宿結尚未除也此不可攻攻之陡損元氣須飲食漸進胃氣漸復津液潤下常見病疫愈啗粥半月結塊方下堅黑如石者又有氣促之病過月餘其塊方消者此又無形之結也不可不知瘟疫下後脈證俱平大便十數日不行時時作嘔此為下膈之證蓋下不能通必反於上宜調胃承氣湯熱服宿垢頓下嘔吐立止慎不可補也凡疫邪貴乎早下但見舌黃心腹脹滿便可選用承氣以驅其邪乘人氣血未亂津液未枯投劑不致掣肘勿拘下不厭遲之說也且疫證之下與傷寒異傷寒必俟結定而後攻疫邪正欲驅熱以為用況疫氣多濕豈能即結遷延不下但蒸作極臭如敗醬如藕泥臨死不結者多矣疫邪傳裡遺熱下焦小便不利邪無輸泄經氣鬱滯其傳為癉身目如金宜茵陳蒿湯若用茵陳五苓散不效此皆胃家移熱是以大黃為專功也茵陳蒿湯茵陳蒿二錢山梔子一錢大黃五錢水姜三片上四味以水一斗先煮茵陳減六升內三味煮取三升去滓分溫三服疫邪在胸膈滿悶喜嘔腹不滿欲吐不吐欲飲不飲此邪與痰飲結滯也宜瓜蒂散吐之瓜蒂散胡瓜蒂一錢赤小豆一錢生梔仁二錢上水煎分二服緩下無瓜蒂用淡豆豉二錢疫氣留血分裡氣壅閉不下則斑不出出則毒邪從外解矣如下後斑漸出更不可下設有下證宜少與承氣緩服倘大下則元氣不振斑毒內陷則危宜托裡舉斑湯如下後斑毒隱伏反見循衣撮空脈微者本方加人參三錢得補發出者不死舉斑湯白芍藥一錢當歸一錢升麻五分柴胡七分白芷七分穿山甲二錢水姜一片上七味水煎溫服疫病日久失下自利純臭水晝夜十數行口燥唇乾舌裂此熱結旁流也急下以大承氣去其宿垢頓止胃實失下鬱而為黃熱更不減摶血為瘀故經氣不為熱鬱不致發黃熱邪不幹血分不致蓄血同受其邪故發黃而兼蓄血非蓄血而致發黃也但蓄血一行熱隨血泄黃隨泄減故治黃茵陳蒿湯治蓄血桃仁承氣湯去桂枝甘草加牡丹皮當歸芍藥桃仁承氣湯桃仁十八粒碎甘草二錢大黃四錢酒浸芒硝二錢桂枝二錢上水煎熱服胃移熱於下焦氣分小便不利熱結膀胱也若移熱於下焦血分膀胱蓄血也夫蓄血證在小便利不利也故晝日稍減夜發熱譫語者瘀血也未行桃仁承氣下之後用犀角地黃調之犀角地黃湯地黃一兩赤芍藥二錢犀角二錢鎊牡丹皮二錢上四味以水二鍾煎八分溫服無時凡失下以致循衣摸床撮空肉惕目不了了邪熱愈盛元氣將脫者勢不可竟下又不得不下不得已用陶氏黃龍湯下之黃龍湯即大承氣湯加甘草人參當歸因不下必死當於死中求生也得下後用生脈散加地黃當歸白芍藥知母陳皮甘草疫病有首尾能食者此邪不實於胃切勿絕其飲食但少少與之耳凡大下後調理清燥養營湯清燥養營湯知母栝蔞根當歸白芍藥生地黃陳皮甘草燈心上八味水煎溫服如表有餘熱柴胡養營湯即小柴胡去半夏人參加陳皮當歸芍藥厚朴生地黃大黃枳實生薑如有痰飲胸膈不清者宜栝貝養營湯栝貝養營湯栝蔞根貝母栝蔞仁蘇子橘紅白芍藥當歸知母生薑上九味水煎溫服舌苔邪在膜原故白在胃則黃苔老則沉香色白者不可下黃者下黑者急下下後苔不脫舌刺舌裂舌短舌硬舌卷白沙苔黑硬苔皆當下白苔滑澤邪在膜原倘別有下證宜達原飲加大黃若大汗脈洪大而渴白虎湯未可下也惟目赤咽乾氣噴如火小便黃赤涓涓作痛揚手擲足脈沉數下之無疑有心下痛腹脹滿頭痛下之立止初起未可下如血液枯竭者為虛燥宜導統論傷寒與時疫異同夫傷寒必有感冒之因惡風發寒頭痛身痛發熱而仍惡寒脈浮緊無汗為傷寒脈浮緩有汗為中風時疫初起原無感冒之因忽覺凜凜以後但熱而不惡寒然亦有所觸而發者或飢飽勞役或焦思怒郁皆能觸動其邪也然不因有所觸而自發者居多且傷寒投劑一汗即解時疫發散雖汗不解傷寒不染時疫能染傷寒之邪自毫竅入時疫之邪自口鼻入傷寒感而即病時疫感而後發傷寒汗解在前時疫汗解在後傷寒可使立汗時疫俟其內潰自汗盜汗戰汗傷寒不發斑時疫能發斑傷寒感邪在經以經傳經時疫感邪在內邪溢於經經不自傳傷寒感發甚暴時疫多有淹纏二三日或漸加重或至五六日忽然加重傷寒初起以發表為先時疫初起以疏利為主其所同者皆能傳胃至是同歸於一故用承氣導邪而出故傷寒時疫始異而終同也傷寒之邪自外傳內原無根蒂惟其傳法有進無退故下之皆能病愈時疫之發始則匿於膜原根深蒂固時發與營衛交併客邪由經之處營衛未有不被其傷者故曰潰然不潰則不能傳不傳則邪不能出邪不出而疾不愈乃時疫下後多有不能即愈者何耶蓋疫邪多有表裡分傳者因有一半向外邪傳留於肌肉一半向里邪傳留於胃家惟傳於胃故里氣結滯里結表氣因亦不通於是肌肉之邪不得即達於肌表下后里氣一通表氣亦順向郁肌肉者方能盡達於表或斑或汗然後可以謀治而愈傷寒下後無有此法雖曰終同實不同也凡陽證似陰者傷寒與瘟疫多有之其陰證似陽者正傷寒有之溫疫必無此證宜辨之夫陽證似陰外雖寒而內有熱故小便必赤澀若陰證似陽者格陽之證也上熱下寒故小便清白但以小便赤白為據萬不失一凡四損不可治大勞大欲大病久病後氣血俱虛陰陽並竭正氣先虧邪氣自陷也夫人疫發見證或輕雖有頭疼身熱自汗而飲食不絕力可徒步又烏知其疫也況脈又不浮不沉而數病人無處追求每每妄訴病情醫家不辨是非便引東垣勞倦傷脾元氣下陷乃執甘溫除熱之句轉補壅熱至於不救矣疫痢相兼之證最危夫疫者胃家事也必從下解利者大腸事也大腸既病失其傳送之職故糞不行下膿血所以向來谷復停積在胃直須大腸邪氣將退胃氣通行積糞從此而下今既大腸失職糞尚不行又何能與胃載毒而出耶毒既不行最能傷敗胃氣毒氣在胃一日有一日之害在一時有一時之害耗氣摶血神氣既盡則死凡遇疫痢兼證者在痢尤為吃緊宜檳榔順氣湯檳榔順氣湯大黃厚朴芍藥檳榔枳實生薑上六味水煎溫服妊娠時疫設用三承氣須隨證施治不可過慮慎勿惑於參耆安胎之說也病家見用承氣先自驚疑更加左右有粗知醫者從旁嘈雜必致掣肘遂令子母不祥若應下之證反用補劑安胎熱毒愈熾胎愈不安耗氣摶血胞胎何賴是以古人有懸鐘之喻梁腐而鍾未有不落者惟用承氣逐其邪火毒消散炎熇頓為清涼氣回而胎自固當此證候大黃反為安胎聖藥歷治歷當母子俱安若見腹痛腰疼則必墮無疑矣須預言之婦人病疫與男子無異惟經水適來適斷及崩漏產後與男子不同經水適來邪不入胃入於血海胸膈無邪勿以胃實攻之但熱隨血下自愈宜小柴胡加生地黃牡丹皮赤芍藥主之如結胸狀者血因邪結刺期門經水適斷血室空虛邪乘虛入為難治與適來者有虛實之分宜柴胡養營湯新產亡血衝任空虛與素病崩漏經氣久虛者亦用此湯若藥停不行加生薑以和其性中氣虛而不運加人參以助其行疫行之時凡小兒兩目上吊驚搐發痙十指勾曲角弓反張勿認驚風治宜同大人但藥劑輕小耳應下之證下後當脈靜身涼今反發熱者因結開氣通郁陽暴伸也不久自息如不息仍是餘邪未盡也下後自臥二三日或四五日汗不止身微熱此仍屬熱其表有餘邪邪盡汗止不止者小柴胡湯加廣皮嘔加半夏虛加人參斟酌治之不可用耆術之屬如脈靜身涼數日後反盜汗宜用略補虛實之分在有熱無熱也下後邪去嘔止今反復嘔者胃虛也少進粥飲調之如人方食肉而病停積在胃用承氣連下惟下旁流臭水其病不退必加人參一味即數十日停積頓行也應下失下真氣微虛及投承氣下咽少頃額上汗出髮根搔癢手足厥冷甚則戰慄心煩坐臥不安如狂之狀此中氣已虧不勝藥力名曰藥煩凡遇此證藥中多加生薑均二三次服以防嘔吐之患病有勞復食復自復勞者補之養之食者輕則損谷重則下奪自復者前用何藥依前增減自愈感冒兼疫先治感冒後治疫瘧疫相兼治疫而瘧自已瘟疫九傳但表不里疫之傳有九然亦不出表裡之間而已但表而不里者其證頭疼身痛發熱而復凜凜內無胸滿等證穀食如常此邪傳外由肌表而出或斑消或汗解為順輕劑可愈有汗出不徹而熱不退者宜白虎湯或斑出不透而熱不退者宜舉斑湯有斑汗並行而並不透者合用前湯但里不表但里不表者惟胸膈痞悶欲吐不吐吐而不快宜瓜蒂散若邪傳裡之中下者心腹脹滿不吐不嘔或燥結便閉或熱結旁流或協熱下利或大腸膠閉並宜承氣輩有里而再發或至於三皆依前法表而再表表而再表者所發未盡膜原尚有隱伏之邪故三四日後依前發熱脈洪而數及其解也斑者仍斑汗者仍汗而愈至於三表者亦稀有也表裡分傳表裡分傳始則邪氣伏於膜原尚在半表半裡二證俱現必先通其里令里邪去自能達表或斑或汗隨其性而升泄之也病退而熱未除者膜原尚有未盡之邪也宜三消飲調之若分傳至再至三未之頻見照前同治再表再里有再表再里或再表裡分傳者醫家不解反責病人不善調養以致反復病家不解每咎醫師疏於救治彼此歸怨胥失之矣不知病勢之當然其氣性如此先表后里先表而後里者始則但有表證而無里證宜達原飲有經證者當依三陽加法繼而脈大且數自汗而渴邪離膜原未能出表宜白虎湯辛涼解散邪從汗解脈靜身涼而愈二三日後或四五日後依然發熱宜達原飲至後反加胸滿腹脹不思穀食煩渴等證加大黃微利之先里後表先里後表者始則發熱漸加里證下之便愈後復發熱反加頭疼身重脈浮者宜白虎湯服之不得汗者津液枯竭也加人參覆杯即解若大汗大下後表裡之證悉去繼而一身盡痛身如被杖脈沉細者此汗出太過陽氣不周骨寒而痛非表證也此不必治二三日內陽回自愈表證偏勝表證偏勝者膜原伏邪發時傳表之邪多傳裡之邪少何以知之表證多而里證少當治其表里證兼之里證偏勝若里證多而表證少但治其里表證自愈邪之傷人也始而傷氣既而傷血傷肉傷筋以至傷骨有行邪有伏邪故治法有難有易取效有遲有速如行邪者即正傷寒也始自太陽或傳陽明或傳少陽病勢雖重一汗可解若歸胃府一下而愈如瘟疫之邪先伏後行伏於膜原如鳥棲巢如獸藏穴營衛所不關藥石所難及至其發也邪毒漸張內侵於腑外淫於經營衛受傷諸證漸顯然後得而治之方其侵淫之際邪毒尚在膜原此時但可疏利使伏邪易出邪毒既離膜原乃觀其變或出表或入里然後可導邪而出邪盡方愈初發之時毒邪漸張莫之能御不惟不能即瘳而病證日惟加重病家見證反增即欲更醫醫家不解亦自驚詫竟不知先時感受邪盛則病重邪微則病輕也人云瘟疫莫治頭勞怯莫治尾所以疫邪方張之際勢不可遏但使邪毒速離膜原便是治法也全在後段工夫識得表裡虛實詳夫緩急輕重投劑不致差謬如是可以萬全即使感受之最重者按法治之必無隕命之理若夫久病枯極酒色耗竭耆耄之年皆是天真幾絕又加疫證自難支矣大頭瘟大頭瘟者此天行之厲氣也其濕熱傷高巔之上必多汗氣蒸初憎寒壯熱體重頭面腫甚目不能開上喘咽喉不利舌乾口燥不速治十死八九宜普濟消毒散如大便硬加酒蒸大黃一二錢緩緩服作丸噙化尤妙若額上面部焮赤面腫脈數者屬陽明本方加石膏內實加大黃若發於耳之上下前後並額角旁紅腫者此少陽也本方加柴胡栝蔞根便實亦加大黃若發於頭腦項下並耳後赤腫者此太陽也荊防敗毒散去人參加芩連甚者砭針刺之普濟消毒散黃連黃芩酒炒人參黑參甘草生桔梗連翹牛蒡子炒研升麻白芷馬勃各一錢殭蠶炒七分藍根如無以青黛代之柴胡各二錢上為末半用水煎去滓食後徐服半用蜜丸噙化就臥以令藥性上行也節庵於普濟消毒散中去人參升麻白芷黑參馬勃殭蠶藍根加川芎羌活防風荊芥射干薑汁竹瀝名芩連消毒飲捻頸瘟捻頸瘟者喉痹失音頸大腹脹如蝦蟆者是也宜荊防敗毒散荊防敗毒散羌活獨活前胡柴胡人參甘草人中黃更妙枳殼桔梗茯苓川芎牛蒡子炒研薄荷荊芥防風上諸藥各一錢惟防風加五分水煎緩服加金汁一杯尤效瓜瓤瘟瓜瓤瘟者胸高脅起嘔血如汁者是也宜生犀飲生犀飲犀角二錢鎊蒼朮泔水浸麻油炒一錢川黃連一錢黃土五錢岕茶葉一大撮金汁半盞上五味水煎去滓入金汁攪和日三夜二服如大便結加大黃渴加栝蔞根虛加人參鹽水炒表熱去蒼朮黃土加桂枝黃連便膿血去蒼朮倍黃土加黃柏便滑以人中黃代金汁楊梅瘟楊梅瘟者遍身紫塊忽然發出黴瘡者是也清熱解毒湯下人中黃丸並刺塊出血人中黃丸大黃三兩溺浸人中黃如無坑垢代之蒼朮去皮麻油炒桔梗滑石各二兩人參黃連酒洗防風各五錢香附薑汁拌勿炒一兩五錢上神麯為丸氣虛四君子湯送血虛四物湯送痰甚二陳湯送熱甚童便送通用清熱解毒湯送二三服清熱解毒湯黃連酒洗黃芩酒洗白芍藥酒洗生地人參各三錢石膏雞子大碎羌活知母各二錢甘草生一錢五分升麻葛根各一錢生薑二錢切上以水一斗煮取五升每服一升日三夜二服疙瘩瘟疙瘩瘟者發塊如瘤遍身流走旦發夕死者是也三稜針刺入委中三分出血及服人中黃散人中黃散辰砂雄黃各一錢五分人中黃一兩上為末薄荷桔梗湯下二錢日三夜二服絞腸瘟絞腸瘟者腸鳴乾嘔水泄不通者是也探吐之宜雙解散軟腳瘟軟腳瘟者便清泄白足腫難移者是也即濕溫宜蒼朮白虎湯不可輕下小兒亦易傳染人見驚搐發痙誤作驚治與大人多彷彿也故凡盛夏濕溫之證即藏疫癘在內一人受之則為濕溫一方傳遍即為疫癘所以疫癘之發每每盛於春夏者以其濕熱暑三氣交蒸故也蓋春主厥陰肝木秋主陽明燥金冬主太陽寒水各行其政惟春分以後至秋分以前少陽相火少陰君火太陰濕土三氣合行其事天本熱也益以日之暑日本烈也益以地之濕三氣交動時分時合其分也風動於中勝濕解蒸不覺其苦其合也天之熱氣下地之濕氣上人在氣交之中無隙可避故病之繁且苛者莫如夏月為最以無形之熱蒸動有形之濕即無病之人感之未免為患況素有濕熱或下元虛人安得不患濕熱之證乎是以濕熱之證最忌發汗發汗則濕熱混而為一中氣盡傷多成死證惟宜分解先抉中氣使中氣徐領其表其里上下分消故多愈也至若疫氣則邪正混合邪極勝正極衰轉眼立斃苦寒傷胃溫補助邪如人中黃之類方為合法也夫傷寒之邪先行身之背次行身之前次行身之側由外廓而入瘟疫之邪則直行中道流布三焦上焦為清陽故清邪從之上入下焦為濁陰故濁邪從之下入中焦為陰陽交界凡清濁之邪必從此區分甚者三焦相混上行極而下下行極而上傷寒邪中外廓一表即散疫邪行在中道表之不散傷寒邪入胃腑則腹滿便鞕故可攻下疫邪布在中焦散之不收下之復合此與治傷寒表裡諸法有何涉哉周禹載曰按吳又可皆論尋常所有疫癘喻嘉言止論天地不正之大疫各極快暢不可執一要知瘟疫有傷氣傷血傷胃之殊故見證不同治亦稍異若入臟者則必不知人而死矣大法以證為則毋專以脈為據也附醫案十則成化二十一年新野疫癘大作死者無虛日鄰人樊滋夫婦臥床數日矣余自學來聞其家人如殺羊聲急往視之見數人用綿被覆其婦床下置火一盆令出汗其婦面赤聲啞幾絕余叱曰急放手不然死矣眾猶不從乃強拽去被其婦躍起倚壁坐口不能言問曰飲涼水否頷之與水一碗一飲而盡始能言又索水仍與之飲畢汗出如洗明日愈或問其故曰彼發熱數日且不飲食腸中枯涸矣以火蒸之速死而已何得有汗今因其熱極投之以水所謂水火既濟也得無汗乎觀以火然枯鼎雖赤而氣不升注之以水則氣自來矣遇此等證者不可不知虞恆德治一婦年二十九三月間患瘟疫證病三日經水適來發熱愈甚至七八日病劇胸中氣築作痛莫能臥眾醫技窮入夜迎虞治病者以綿花袋盛托背而坐於床令婢摩胸不息六脈俱微數而無倫次又若蝦游狀虞問曰恐下早成結胸耳主人曰未也虞曰三日而經水行致中氣虛與下同乃用黃龍湯四物湯小陷胸湯共為一劑加薑棗煎服主人曰此藥何名虞曰三合湯也一服諸證悉減遂能臥再服熱退病安又因食粥太多復病熱作內傷治用補中益氣湯出入加減調理而愈汪石山治一人年弱冠房勞後忽洒洒惡寒自汗發熱頭背胃脘皆痛唇赤舌強嘔吐眼胞青色醫投補中益氣午後譫語惡熱小便長初日脈皆細弱而數次日脈則浮弦而數醫以手按臍下痛議欲下之汪曰此疫也疫兼兩感內傷重外感輕耳臍下痛者腎水虧也若用利藥是殺之耳古人云疫有補有降有殺茲宜合補降二法以治用清暑益氣湯除蒼朮澤瀉五味加生地黃芩石膏服十餘帖而安壺仙翁治文學張微伯病風熱不解時瘟疫大行他醫診其脈兩手俱伏曰此陽證見陰不治欲用陽毒升麻湯升提之翁曰此風熱之極火盛則伏非陰脈也升之則死矣卒用連翹涼膈之劑一服而解泰和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭傷寒諸藥雜治莫能愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭面而為腫耳用普濟消毒散如法服之活者甚眾時人皆曰天方羅謙甫治中書右丞姚公茂六旬有七宿有時毒至元戊辰春因酒再發頭面腫疼耳前後腫尤甚胸中煩悶咽嗌不利身半以下皆寒足脛尤甚由是以床相接作坑身半以上臥於床身半以下臥於坑飲食減少精神困倦而體弱命羅治之診得脈浮數按之弦細上熱下寒明矣內經云熱勝則腫又曰春氣者病在頭難經云蓄則腫熱砭射之也蓋取其易散故也遂於腫上約五十餘刺其血紫黑如露珠之狀頃時腫痛消散又於氣海中大艾炷灸百壯乃助下焦陽虛退其陰寒次於三里二穴各灸三七壯治足胻冷亦引導熱氣下行故也遂處一方名既濟解毒湯論曰熱者寒之然病有高下治有遠近無越其制度以黃芩黃連苦寒酒炒瀉其上熱以為君桔梗甘草辛甘溫上升佐諸苦藥以始其熱柴胡升麻苦平味之薄者陰中之陽發散上熱以為臣連翹苦辛平以散結消腫當歸辛溫利血止痛酒煨大黃苦寒引其上行至巔驅熱而下以為使投劑之後腫消痛減大便利再服減大黃慎言語節飲食不旬日良愈秋官陳同野元氣素弱脈細微而伏用參朮芎歸陳皮柴胡升麻炙甘草以升舉陽氣用牛蒡玄參連翹桔梗以解熱毒二劑腫頓消而脈亦復矣設以脈微細為純陰以腫為純陽藥之鮮有不誤者江篁南治給事中游讓溪嘉靖壬子正月忽感大頭風證始自頸腫時師以為外感而誤表之繼以為內傷而誤補之面發赤三陽俱腫頭頂如裂身多汗寐則譫語綿延三日喘咳勢急其親汪子際以竹茹橘皮湯繼以川芎茶調散合白虎湯去人參服一劑而減次日用前方去寒峻藥至晚漸定耳輪發水泡數個余腫漸消獨耳後及左頰久不散又次日以當歸六黃湯為主加散毒之藥延及二旬頂巔有塊如雞子大突起未平及面頰余腫未消有時頭痛大便稀溏時二月中旬江至診得左脈浮小而駛右脈浮大近快有勃勃之勢江按脈證當從火治以生黃耆八分白朮薏苡各一錢半茯苓片芩各八分生甘草三分煎加童便服次日脈稍平然兩頰猶赤早間或覺頭痛蓋餘火未全殺也黃耆加作一錢二分薏苡加作二錢頂塊漸消以後加生耆二錢更飲綠豆湯童溲五劑而愈靖康二年春京師大疫有異人書一方凡因疫發腫者服之無不效方用黑豆二合炒令香熟甘草二寸炙黃水二盞煎半時時呷之崇禎壬午癸未時疫盛行道殣相藉發汗和中藥內惟用人參者多以活人疫病論周禹載曰疫之行於天地間久矣而人之治之者未之知也治之而適奏其效者亦未知之也觀周禮方相氏所掌難以逐疫則疫者氣為之也惟氣故為害從口鼻入雖然六淫之氣皆氣也而風寒暑濕燥火之病不聞有沿門闔境相染觸發者何也六淫之氣日留於天地之間偏勝則病且人之病之者每因於己之所不勝以淫於所勝而不獨天地之氣足以害之也若疫則古今來雖有是證而天地間實無是氣或因天之風雨不時地之濕濁蒸動又因胔骼掩埋不厚遂使大陵積屍之氣隨天地之升降者飄泊遠近人在氣交中無可逃避感之而病而死於是更增一種病氣屍氣流行其間復相漸染至久彌甚矣故從來疫癘行於兵荒之後居多不但人之中氣先弱也良由所積之穢氣特甚耳乃數千年來說鬼說夢賴嘉言先生援經據古特標蘊義我北海林夫子引伸觸類指點治法豈非功在萬世者乎但嘉言自詡於平脈篇中已見一斑謂清邪中於上焦濁邪中於下焦云云以為此即是仲景論疫予未之信也天下穢惡之氣至疫則為毒極矣人犯之者三焦混淆內外無間不分表裡直行中道然究竟古今恆變未有定情而中上中下之說仲景實論濕氣之脈如是而後入腑入臟遊行經絡便有種種危證只因三焦相混內外不通等語有似乎疫而實無涉也此嘉言善讀書處能開發人之聰明譬之茫無畔岸借為指南則可謂竟為疫之脈證則甚謬矣然則如世俗所稱大頭瘟者下非不病也特甚於上耳所稱疙瘩瘟者內非不病也特現於外耳所稱蝦蟆瘟者腹非不病也特痹於喉耳其他證顯多端要以寒涼解毒則一施治之法先上先下從內從外可以因證起悟予惟奉吳又可先生書為主治余採集諸方以相裨佐俾後之學者豁然心目云附北海林先生題喻嘉言疫論序張鳳逵之著傷暑全書也翻古人之成案妙生心之化裁可謂善於立言者矣第疫證引說不明關係醫學非小雖以東垣之淵通丹溪之博洽亦隨俗相沿未有確解近喻嘉言先生以通今博古之才著開天闢地之論掃叔和之穢闡仲景之奧不剿陳言獨標新義從來迷謬渙然冰釋至於治法高出千古直髮前人所未發誰謂今人不及古人之精乎故附刊之用告業醫之士焉蓋天地以生物為心寒熱溫涼四氣遞運萬古不易人生其間感觸寒暑而病者皆其起居無時飲食不節氣虛體弱自行犯之非寒暑之過也然亦不過千百中之一二耳若以寒暑為殺厲之氣觸之即病則人無噍類久矣豈天地生人自然之道哉至非其時而有其氣謂之不正之氣則可謂之疫氣則非也何也不正之氣人感之者有病有不病未可一概論也若夫疫氣則不論富貴貧賤老幼男女強弱虛實沿門闔境傳染相同人無得免者此唯大兵大荒之後有之而饑饉之年尤甚流離滿野道殣相望或趨鄉鎮或集郡邑或聚都城安置失所賬濟寡術九重萬里呼答無門三五為群死無虛日千百一豖埋藏不深掩蓋不厚時至春和地氣轉動浮土塌陷白骨暴露血水汪洋死氣屍氣濁氣穢氣隨地氣上升混入蒼天清淨之氣而天地生物之氣變為殺厲之氣無形無影無聲無臭從口從鼻而入直犯臟腑正氣閉塞邪氣充斥頃刻云亡莫可救藥說文云疫者民皆病也厲鬼為災斯名疫耳禮記月令云孟春之月先王掩骼埋胔正以是月天氣下降地氣上升誠恐胔骼穢惡之氣隨天地之氣升降混合為一有害人物故掩埋之此預補造化大有功也蓋以人在氣交之中如魚在水一毫渣滓混雜不得設川澤潑灰池塘入油魚鮮有得生者人受疫氣何以異此是以自古聖君賢相參贊化育變理陰陽消弭疫端於平日捍患御災煮粥施藥救濟疫害於臨時人無橫夭世躋雍熙文人解為澤及枯骨失其旨矣詎春月當澤及枯骨而夏秋冬之枯骨遂不當澤及哉近有好事之輩設立壇廠每於小兒出痘之年購求夭亡屍骸雖經埋痤亦必刨出堆集如山架火燒焚烈焰張熾腥聞於天神人掩鼻毒氣熏蒸惡味氤氳流行傳染以致嬰孩生出一等怪證似痘非痘似疹非疹似斑非斑一二日間即涉危篤雖有良醫莫敢措手共相詫諤咸謂天生異災不知致此之由頻年以來冤枉赤子何啻數萬離城二三十里即無此證豈非明驗與嗟嗟異端妖術惑世誣民昧者反以為善聚眾譁之斂財助之此倡彼和奔走若狂揆之先王掩骼埋胔之義不大相乖舛耶因序疫證而並及之以望世之學醫者加之意焉漁陽林起龍北海識於補拙齋附喻嘉言瘟疫論喻昌曰聖王御世春無愆陽夏無伏陰秋無悽風冬無苦雨乃至民無夭札物無疵癘太和之氣彌滿乾坤安有所謂瘟疫哉然而周禮儺以逐疫方相氏掌之則瘟疫之由來古有之矣鄉人儺孔子朝服而致其誠敬蓋以裝演巨像為儺神不過彷彿其形聖人以正氣充塞其間俾疫氣潛消乃位育之實功耳古人元旦汲清泉以飲芳香之藥上已採蘭草以襲芳香之氣重滌穢也後漢張仲景著傷寒論欲明冬寒春溫夏秋暑熱之正自不能併入疫病以混常法然至理已畢具於脈法中叔和不為細繹乃謂重感於寒變為瘟疫又謂春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也又謂冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同又謂從春分節後至秋分節前天有暴寒者皆為時行寒疫也蓋以春夏秋為寒疫冬月為瘟疫所以又云三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微後人奉此而廣其義謂春感清邪在肝夏感寒邪在心秋感熱邪在肺冬感溫邪在腎塤篪遞奏舉世若狂矣嗟嗟疫邪之來果寒折陽氣乘其所勝而直入精神魂魄之臟人無噍類久矣更有謂疫邪無形象聲臭定時定方可言是以一歲之中長幼莫不病此至病傷寒者百無一二治法非疏里則表不透非戰汗則病不解愈摹愈遠究竟所指之疫仍為傷寒傷溫傷暑熱之正病疏里則下早可知戰汗則失表可知只足自呈敗闕耳夫四時不正之氣感之者因而致病初不名疫也因病致死病氣屍氣混合不正之氣斯為疫矣以故雞瘟死雞豬瘟死豬牛馬瘟死牛馬推之於人何獨不然所以饑饉兵凶之際疫病盛行大率春夏之交為甚蓋溫暑熱濕之氣交結互蒸人在其中無隙可避病者當之魄汗淋漓一人病氣足充一室況於連床並榻沿門闔境共釀之氣益以出戶屍蟲載道腐墐燔柴掩席委壑投崖種種惡穢上混蒼天清淨之氣下敗水土物產之氣人受之者親上親下病從其類有必然之勢如世俗所稱大頭瘟者頭面腮頤腫如瓜瓠者是也所稱蝦蟆瘟者喉痹失音頸筋脹大者是也所稱瓜瓤瘟者胸高脅起嘔汁如血者是也所稱疙瘩瘟者遍身紅腫發塊如瘤者是也所稱絞腸瘟者腹鳴乾嘔水瀉不通者是也所稱軟腳瘟者便清泄白足重難移者是也小兒痘瘡尤多以上疫證不明治法咸委劫運良可傷悼大率瘟疫痘疹古昔無傳不得聖言折衷是以墮落叔和坑塹曾不若俗見摸索病狀反可顧名思義也昌幸微窺仲景一斑其平脈篇中雲寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內慄也表氣虛微裡氣不守故使邪中於陰也陽中於邪必發熱頭痛項強頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下陰氣為慄足膝逆冷便溺妄出表氣微虛裡氣微急三焦相溷內外不通上焦怫鬱臟氣相熏口爛蝕齦也中焦不治胃氣上衝脾氣不轉胃中為濁營衛不通血凝不流若胃氣前通者小便赤黃與熱相摶因熱作使遊於經絡出入臟腑熱氣所過則為癰膿若陰氣前通者陽氣微厥陰無所使客氣內入嚏而出之聲嗢咽塞寒厥相逐為熱所擁血凝自下狀如豚肝陰陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全凡二百六十九字闡發奧理全非傷寒所有事乃論疫邪從入之門變病之總所謂赤文綠字開天闢地之寶符人自不識耳篇中大意謂人之鼻氣通於天故陽中霧露之邪者為清邪從鼻息而上入於陽入則發熱頭痛項強頸攣正與俗稱大頭瘟蝦蟆瘟之說符也人之口氣通於地故陰中水土之邪者為飲食濁味從口舌而下入於陰入則其人必先內慄足膝逆冷便溺妄出清便下重臍築湫痛正與俗稱絞腸瘟軟腳瘟之說符也然從鼻從口所入之邪必先注中焦以次分布上下故中焦受邪因而不治中焦不治則胃中為濁營衛不通血凝不流其釀變即見中焦俗稱瓜瓤瘟疙瘩瘟等證則又陽毒癰膿陰毒遍身青紫之類也此三焦定位之邪也若三焦邪混為一內外不通臟氣熏蒸上焦怫鬱則口爛蝕齦衛氣前通者因熱作使遊行經絡臟腑則為癰膿營氣前通者因名客邪嚏出聲嗢咽塞熱擁不行則下血如豚肝然以營衛漸通故非危候若上焦之陽下焦之陰兩不相接則脾氣於中難以獨運斯五液注下下焦不闔而命難全矣傷寒之邪先行身之背次行身之前次行身之側由外廓而入瘟疫之邪則直行中道流布三焦上焦為清陽故清邪從之上入下焦為濁陰故濁邪從之下入中焦為陰陽交界凡清濁之邪必從此區分甚者三焦相溷上行極而下下行極而上故聲嗢咽塞口爛蝕齦者亦復下血如豚肝非定中上不及下中下不及上也傷寒邪在外廓故一表即散疫邪行在中道故表之不散傷寒邪入胃腑則腹滿便堅故可攻下疫邪在三焦散漫不收下之復合此與治傷寒表裡諸法有何干涉奈何千年憒憒試折衷以聖言從前謬迷不渙然冰釋哉治法未病前預飲芳香正氣藥則邪不能入此為上也邪既入則以逐穢為第一義上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒營衛既通乘勢追拔勿使潛滋或問春夏秋蒸氣成疫豈冬溫獨非疫耶余曰冬月過溫腎氣不藏感而成病正與不藏精之春溫無異計此時有春無冬三氣即得交蒸成疫然遇朔風驟發則蒸氣化為烏有矣是以西北土高地燥即春夏氣難上升何況冬月之凝冱東南土地卑濕為霧露之區蛇龍之窟其溫熱之氣得風以播之尚有可耐設旦暮無風水中之魚衣中之蝨且為飛揚況於人乎蒸氣中原雜諸穢益以病氣死氣無分老少觸之即同一病狀矣此時朔風了不可得故其氣轉積轉暴雖有薰風但能送熱不能解涼盛世所謂解慍阜財者在兵荒反有注邪布穢之事矣叔和以夏應大熱而反大寒為疫詎知大寒正疫氣消弭之候乎故疫邪熾甚惟有北方始能消受詩惡譖人思欲投畀有北以熄其焰析義精矣疾病方一十六道達原飲柴胡清燥湯茵陳蒿湯瓜蒂散舉斑湯桃仁承氣湯犀角地黃湯清燥養營湯栝貝養營湯檳榔順氣湯普濟消毒散荊防敗毒散生犀飲人中黃丸清熱解毒湯人中黃散方俱見前附集方一十六道既濟解毒湯黃芩一錢酒炒黃連一錢酒炒桔梗一錢甘草五分生柴胡五分升麻七分連翹一錢當歸一錢酒洗大黃一錢酒煨上以水二盞煎一盞徐徐溫服黃連解毒湯黃連阿膠湯二方俱見前黃連瀉心湯黃連生地黃知母各一錢五分甘草五分生上以水一盞半煎八分溫服黃連龍骨湯治腹痛咽痛體熱煩苦黃連黃芩芍藥各八分龍骨五分為末上以水一盞半煎八分溫服黃連犀角湯治狐惑犀角三錢磨汁黃連二錢烏梅四個木香三錢磨汁上以水一盞半入黃連烏梅煎八分入犀角汁木香汁和勻服黑膏治疫毒發斑嘔逆生地黃二兩六錢淡豆豉二兩六錢上二味以豬膏六兩合煎令三分減一絞去滓取濃汁如膏入明雄黃豆大麝香少許和勻分三服犀角消毒湯牛蒡子炒防風各二錢荊芥一錢甘草八分犀角磨汁上㕮咀每服三錢水煎入犀角汁服漏蘆湯治臟腑積熱發為腫毒時疫疙瘩頭面洪腫咽溢堵塞水藥不下一切危惡疫癘漏蘆升麻大黃黃芩各一兩藍葉黑參各二兩上六味為粗末每服二錢水一盞半煎至六分去滓溫服腫熱甚加芒硝二錢半及生甘草牛蒡子連翹更神消毒丸大黃牡蠣燒殭蠶各一兩炒上為末蜜丸彈子大新汲水化下一丸無時雄黃丸雄黃一兩研赤小豆炒熟丹參鬼箭羽各二兩上為細末煉蜜丸如梧子大每日空心以溫水下五丸雖同床共屋亦不相染運氣五瘟丹黃芩黃柏黃連山梔子香附紫蘇甘草梢大黃上七味生用於冬至日為末將大黃三倍煎湯去滓搗藥丸如雞子大硃砂雄黃為衣再貼金箔一丸取泉水七碗浸化可服七人此藥乙庚年黃芩為君丁壬年山梔子為君丙辛年黃柏為君戊癸年黃連為君甲巳年甘草梢為君為君者多一倍也餘四味與香附紫蘇為臣者減半每年熱病改為小丸救人甚妙大青丸薄荷山梔子黃芩黃連各三錢連翹六錢甘草三錢大黃白龍骨粉各八分上為末用青蒿自然汁為丸綠豆大雄黃為衣每服十丸白湯送下二黃丸治大頭時疫黃連酒炒黃芩酒炒生甘草各等分上㕮咀每服五錢水一盞半煎八分稍溫徐徐呷之救急解毒丸甘草桔梗各二兩荊芥防風連翹酒黃芩酒大黃薄荷酒黃連升麻各一兩殭蠶蒲黃青黛盆消射干各五錢上十五味共為極細末羅淨以烏梅湯調柿霜和丸如圓眼大噙化煎湯亦可神授香蘇散治瘟疫昔有城中大疫一白髮老人教富人合此藥施病者皆愈疫鬼相顧曰此老教三人矣遂遁紫蘇香附各二兩醋製陳皮一兩去白甘草五錢上為細末每服三錢水一盞半煎七分溫服凡遇天行時氣恐其傳染須遲出早入腹中常飽身佩靈符時焚椒蘭芷術清烈之香鼻孔塗雄黃最良老君神明散東坡聖散子等方皆一派辛熱燥烈有毒之藥全無扶正驅邪逐穢解毒之品不知醫書何以列之疫條必系後人偽託學者慎勿徇名妄用害人非淺虞天民辨之最詳不可不考
