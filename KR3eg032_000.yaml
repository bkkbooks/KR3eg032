body:
  text: 自序醫之道難矣哉凡病傷寒最重溫熱尤烈傷寒僅在一時溫熱暑疫每發三季為時既久病者益多苟不明其源溯流不得清也不辨其類療治不得當也則溫熱暑疫皆熱證也燎原之下竟乏清涼一滴人無今昔性有異同神酣往聖志切琳琅俊以一隙微明靜中索照焉夫上古聖人首重色脈以營之未交已交定人生死片言已畢中古聖人專論穀氣盛衰定人生死片言已畢仲景叔季聖人也既立方論復出不盡之臟緯以膀胱之傷與絶定人生死先後合符了無剩義矣乃仲景於傷寒論中溫熱森森具載黃芩白虎等湯是其治也後之學者苟能引伸此意便可變化不窮神明千載不能細察其理反執以為治傷寒之法盍思本湯既無外解之功又無內奪之力聖人立法果何謂乎自晉以來疑鬼疑蜮陋濕無巳如崔文行解溫用白朮烏頭細辛桔梗四味更加附子名老君神明散更加螢火名務成子螢火丸熱藥相投以火濟火誰其辨諸如仲景書謂太陽病發熱不惡寒而渴者為溫病朱肱活人書謂發熱惡寒頭疼身痛者為溫病已悖聖訓矣又云春秋發斑咳嗽為溫病至風溫治在少陰其所立五方如葳蕤湯知母葛根湯防己湯栝蔞根湯葛根龍膽湯風火相熾燔灼無休復改聖散子仍用附子表裡香燥同之東坡先生在黃州時頗稱其效豈知朱肱已三易其方用敗毒散而遠熱藥然厥功奚減厥罪吳氏謂傷寒壞病更遇溫熱為溫病潔古老人傷寒名家也其子云岐以傷寒過經不解者為溫病指叔和之言為仲景之文趙嗣真謂仲景云重感異氣變為溫病汪機謂仲景云遇溫氣為溫病遇溫熱為溫毒竟不顧聖經之載於方策者何曾有此一語巢氏病源遵崔文行解散法一日用摩膏火灸二日針灸解散三日復汗之四日用藜蘆丸瓜蒂散吐之五六日解未了了者復針之七日熱已入胃雞子湯下之遂使龐安常自撰微言一以和解為主奉為靈寶少移則蹶巢龐比匪何極李思訓亦宗和解王海藏稱其當宋全盛明哲莫逾擬非其倫矣丹溪長於溫熱善用涼藥溫熱遇之自能解散要非有斟酌於其間也東垣不善外感長於內傷乃從內經悟出冬溫春溫二義誠暗中一大炬嘉言極口歡頌真先得我心者矣逮劉河間傷寒直格於熱病每多入理深談然混在正傷寒中在人眼光采擇不免金屑雜於泥沙者歟至明季方中行著傷寒條辨可謂直登仲景之堂獨開生面惜其論溫熱亦分陰分陽似可用熱遂為嘉言所宗嗟乎病名溫熱自需寒涼乃千百年來盈庭聚訟先後支吾陽春寡和於漢庭塤篪迭奏於晉室良由來派不清復無面牆體認誠習焉而不察耳不然豈諸公各自名家乃甘悖聖矩如是耶若夫夏月暑證即金匱中濕暍氣蒸之病也潔古東垣以動靜分陰陽動而得之為陽用白虎靜而得之為陰用大順冷香諸劑豈知夏月杲杲炎威有陽無陰動靜不甚相遠惟多食冰果冷物及恣意房幃致傷太陰少陰者熱藥可以暫用豈得視溫熱之味為通行之藥乎漕憲北海林夫子為一代偉人醫學宗匠俊立雪程門三五年間極蒙提命因授所刻明計部張鳳逵治暑書申明理蘊精確不磨雖有小疵不掩大德誠可振聾瞶於千古者也至叔和云四時不正之氣感則為疫不知非時不為厲氣僅為寒疫而大疫之沿門闔境傳染相同者允在兵荒之後尸濁穢氣充斥道路人在氣交感之而病氣無所異人病亦同所以月令於孟春掩骼理胔不敢或後者聖王早慮及此耳非徒澤及枯骨也後世治疫之法未有定見如嘉言上焦如霧升逐解毒中焦如漚疏逐解毒下焦如瀆決逐解毒俟其營衛既通乘勢追拔勿使潛滋暗長於未盡之時此固不易之論然求其反復盡義變態直窮老長吳又可之言別無依傍也俊幸生明備不安苟且日引光明之藏志披榛莽之途輯仲景傷寒論三注金匱補注之餘先將溫熱暑疫四證釐訂經文採集方論無背聖法有合病情各自成帙蒙藩憲丁夫子因戊午年時疫盛行憫編戶之疾苦如恫瘝之乃身遂下詢疫所自始與所為治惻然嘆曰嗟乎安得明此理者數十輩循行救治俾在火輪火樹夢魘心迷者一旦提置冰山雪寶之中奚止飲醍醐而稱快哉命急付棗以公同志康熙己未辜月吳門周揚俊禹載識
