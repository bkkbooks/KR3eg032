body:
  text: 卷一溫病方論太陽病發熱而渴不惡寒者為溫病周注溫病由伏邪自內發出一達於外表裡俱熱熱勢既壯郁邪耗液故發而即渴其表本無邪郁內方喜寒故不惡寒延至三五日間或腹滿或下利者即此證也與傷寒之先表后里者大異然獨系太陽以未顯他經之證明自少陰發出為表裡也若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期方注灼熱謂熱轉加甚也風溫謂於溫病有風也陰陽俱浮太陽本浮而風溫皆陽故上下皆見浮也自汗出亦衛受傷也身重多眠睡鼻息必鼾語言難出者風擁則氣昏熱甚則氣鬱也小便不利者太陽主膀胱而風溫皆陽下則反攻徒亡其津液而膀胱之氣傷也直視者太陽之筋支者為目上綱故不轉睛而上竄也失溲言小便甚失其常度也火灸尉之類也微言攻之微則變亦微發黃者火熱則土燥故其色外奪也劇言攻之劇則變亦劇如驚癇時瘛瘲者火盛熱極而生風也熏亦火劫也一逆言乍誤也尚引日言猶可俄延再逆言復誤也促命期言夭枉人之天年其致警之意深矣周注此條緊承上文云若發汗已身灼熱者名曰風溫是仍太陽病溫誤發其汗與更感於風者自是不同然亦名風溫何也既曰太陽不即顯少陰證惟誤汗則其證本溫復以辛熱之藥汗之則陰津外出表裡增熱脈必至尺寸俱浮正以風與溫混腎水不能獨沉其證自汗身重腎本病也多眠睡鼻息鼾語言難腎本病也始先太陽因汗使少陰之候同時薦至危且殆矣古律垂戒云風溫治在少陰不可發汗發汗者死豈知太陽亦不可發汗發汗則亦同於風溫之少陰乎緣醫者誤認為傷寒而用正汗藥也若不汗而誤下者傷膀胱之氣化小便不利津液大傷直視失溲一腑一臟同時兩絶矣至誤被火劫者微則熱傷營氣而熱瘀發黃劇則熱甚風生而驚癇瘛瘲蓋因亂其神明擾其筋脈也然則於三者之中一逆已待斃再犯則立危矣喻嘉言論內經刺熱論溫首引太陽之脈色榮顴骨榮未交曰今且得汗待時而已與厥陰爭見者死期不過三日其熱病內連腎少陽之脈色榮頰前榮未交曰今且得汗待時而已與少陰脈爭見者死互言得汗非發汗也故聖人專論穀氣腎中精勝乃汗則生腎中虛甚更熱則死其旨至矣盡矣仲景復出不盡之臟更視膀胱以緯之視小便不利則膀胱傷甚直視失溲命門所藏之精不能照物神髓涸矣瞳子高為太陽不足戴眼為太陽已絶已絶者其足不可屈伸是以中風暴病多絶膀胱不識人者風溫扼要首視膀胱未有膀胱不絶而腎水先絶者也太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之周注黃芩湯治溫本藥也明言太少二陽何不用二經藥非傷寒也傷寒由表入里此則自內發外無表何以知太少二陽或脅滿或頭痛或口苦引飲因不惡寒而即熱故不得謂之表也如傷寒合病皆表病也今不但無表且有下利里證傷寒協熱利必自傳經而入不若此之即利也溫何以即利外發未久內郁已深其人中氣本虛豈能一時盡泄於外勢必下走作利矣黃芩湯黃芩三兩甘草二兩炙芍藥二兩大棗十二枚擘上四味以水一斗煎取三升去滓溫服一升日再服夜一服若嘔者加半夏半升生薑三兩黃芩加半夏生薑湯黃芩三兩甘草二兩芍藥二兩大棗十二枚擘半夏半升生薑三兩上六味以水一斗煮取三升去滓溫服一升日再服夜一服周注黃芩滌熱故為溫利主藥以能泄熱也然用芍藥者性酸寒深入陰分一泄一收熱去而利止耳取甘棗者和中也膀胱與膽二腑既病胃無獨安之理至有嘔明有痰飲結聚非薑半不除薑半辛燥非伏氣所宜而去嘔則有殊功也況以芩為君又何畏乎三陽合病脈浮大上關上但欲眠睡目合則汗方注太陽脈浮陽明脈大關上乃少陽之部位故曰三陽合病但欲眠睡者熱聚於膽也目合則汗者少陽少血虛則不與陽和寐屬陰故盜汗出也周注溫氣發出乃至三陽皆病其邪熱溷實不言可知故其脈浮大也憶邪伏少陰時則尺脈亦已大今因由內發外由下達上而浮大見於關以上故曰上關上也邪雖上見陽位少陰之源未靖則欲眠尚顯本證而目合則汗即為盜汗又顯少陽本證何以獨見少陽因母虛子亦虛而少陰邪火與少陽相火同升燔灼也所以稍異熱病者但目合則汗不似熱病之大汗不止也然何以不言太陽陽明二經證以浮為太陽經脈大為陽明經脈也治法當以小柴胡去人參薑半加芍藥為主師曰伏氣之病以意候之今月之內欲有伏氣假令舊有伏氣當須脈之若脈微弱當喉中痛似傷非喉痹也病人云實咽中痛雖爾今復欲下利周注於伏氣之時見伏氣之病而脈得微弱則是少陰脈也其人腎氣虛者不及於陽而即發於陰以少陰脈本循喉也故將發必咽痛至發後則痛極似傷矣豈可認為痹證而誤治耶然咽痛勢已發於上殊不知腎司開闔陰熱上升豈遂盡泄故必疾趨後陰而下利可預知也少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯周注伏氣發出少陰之經必咽痛者不必言矣先與甘草湯以緩其上升之勢更與桔梗湯以開其怫鬱之邪亦不必言矣但伏氣為重證少陰為至虛仲景輕輕先試不用黃芩本湯者夫豈無故以才發少陰止見咽痛無胸滿心煩等症也無下利嘔渴等症也欲用他藥從何入手故二三日間姑就咽痛連舉二湯使服之痛止則少陰之邪先已去其大半後有證見隨之投藥此聖人明示不可妄治之道也甘草湯甘草二兩上一味以水三升煮取一升半去滓溫服七合日二服周注少陰之脈循喉嚨邪熱客之能無痛乎正挾少陰之火上升也主甘草者甘能治熱火也桔梗湯桔梗一兩甘草二兩上二味以水三升煮取一升半去滓分溫再服周注設服前湯而不除非藥之不勝病也正以少陰之火挾邪上攻則並其母亦病故加桔梗開之而自無不愈矣少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之周注伏邪未發津液先已暗耗今得之二三日以上雖陰火不升未見咽痛等證而心煩不臥已知陰血消耗故令芩連祛熱膠芍滋陰兩得之矣黃連阿膠湯黃連四兩黃芩二兩芍藥二兩雞子黃二枚阿膠三兩上五味以水五升先煮三物取二升去滓內入膠煬盡小冷內雞子黃攪令相得溫服七合日三服周注裡熱當祛之內燥須滋之然滋之而即得其潤祛之而適滌其熱惟聖人合宜也心煩故主黃連佐以黃芩則肺胃之邪俱清然熱甚以消少陰之水水源既燥津液有不匱乏者乎雞子黃阿膠深益血分之味以滋其陰連芩得此功莫大焉況加芍藥以斂消爍之心氣兼以入肝遂使煩者不煩不臥者臥矣春溫集補證治並方凡溫病發必渴而煩擾脅滿口苦惡熱而不惡寒明系自內發出更無表證雖經絡不同必先少陽以春行風木之令也一法少陽陽明合病里證多者承氣湯一法三陽合病大柴胡湯或雙解散一法若少陽經有客邪而發脈弦兩額旁痛寒熱口苦宜小柴胡去人參薑半加栝蔞根有嘔者但去人參一法脈微緊兼惡寒頭痛宜梔子豉湯或益元散加蔥豉薄荷熱甚涼膈散去大黃朴硝加蔥豉一法頭痛如破暴感外邪宜葛根蔥白湯散邪後用黃芩湯一法脈洪大而數外熱譫語熱在三焦也三黃石膏湯一法凡應下證下後熱不去或暫解復熱再下之一法下後熱不止脈澀咽痛胸滿多汗熱傷血分也葶藶苦酒湯吐之一法裡熱已甚陽邪怫鬱作戰而不能汗出雖下證未全者宜涼膈散一法腹滿煩渴脈沉實者三承氣湯選用勢劇者合黃連解毒湯附風溫一法倘溫病少陰伏邪發出更感太陽客邪名曰風溫必陽脈浮滑陰脈濡弱發熱咽痛口苦但微惡寒者黃芩湯加桂枝石膏或以蔥豉先撤其外後用黃芩湯甚則葳蕤湯加減一法本太陽病發熱而渴誤發汗身灼熱者亦名風溫脈陰陽俱浮如前證用麻黃升麻湯去二麻薑術按誤汗風溫一證仲景不出方者以為太陽少陰同時薦至危於兩感去生甚遠也附冬溫一法冬時有非節之暖未至而至即為不正之氣獨冬不藏精之人腎氣外泄腠理不固溫氣襲人感之為病此為冬溫脈必寸洪尺數或實大心煩嘔逆身熱不惡寒或頭疼身重面腫咳嗽咽痛下利與溫無異而時令不同也宜陽旦湯加桔梗茯苓一法若有寒食停滯加厚朴溫藥一味以溫散其中黃芩涼解其外即仲景陰旦湯之意也一法若先感溫氣即被嚴寒遏抑則發熱而微畏寒汗不出而煩擾陽旦加麻黃石膏發之一法醫視冬溫每有誤認傷寒辛熱發汗致令發斑成毒者當以升麻葛根湯加犀角黑參或犀角黑參湯一法更有辛熱發汗徒耗津液裡熱益甚胸腹滿悶因誤用下藥反發熱無休止脈來澀此陰血受傷也急宜葶藶苦酒湯探之以收陰氣泄邪熱若服後熱勢轉劇神氣昏憒譫語錯亂者必不救也冬溫為病亦自不一當各隨見證治之凡冬溫之毒大便泄而譫語脈虛小手足冷者皆不治也附溫瘧一法春時溫病未愈適復感寒忽作寒熱者溫瘧也陰陽例云脈陰陽俱盛重感於寒變為溫瘧其證寒熱交作胸脅滿煩渴而嘔微惡寒者小柴胡去參半加栝蔞根石膏一法無寒但熱其脈平骨節煩疼時嘔者黃芩加生薑湯至如內經所言先熱後寒之溫瘧乃得之冬中於風寒氣藏骨髓之內至春陽氣大發之時邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有勞力邪氣與汗共並而出此病藏於腎自內達外者也如是則陰氣虛而陽邪盛故為熱熱盛則必衰衰則氣反而復入入則陽虛陽虛則又寒矣故先熱後寒名曰溫瘧治宜人參白虎湯周禹載曰或有客邪則必先微惡寒繼大熱熱而後大寒者也本湯中略用桂枝此伏邪自發之溫瘧與溫病復感外邪之溫瘧自是兩種附溫毒發斑熱病發斑同此發斑因失於汗下熱毒內攻不得散蘊於胃腑而發出肌表或汗下不解足冷耳聾胸中煩悶咳嗽嘔逆躁熱起臥不安者便是發斑之候春至溫病之人更遇時熱為未至而至之異氣變為溫毒王叔和云陽脈洪數陰脈實大更感溫濕變為溫毒伏溫與時熱交併表裡俱熱溫熱為病最重也其脈浮沉俱盛其證心煩悶嘔逆喘咳甚則面赤身體俱赤色狂亂躁渴咽腫痛狂言下利而發斑最為危候斑如錦紋身熱煩躁大便燥結者黃連解毒湯若躁悶狂妄而無汗者三黃石膏湯自汗煩渴而發斑為胃熱人參化斑湯煩熱錯語不眠白虎合黃連解毒湯斑不透犀角大青湯已透熱不退本湯去升麻黃芩加人參生地黃柴胡凡斑色紫者為危候黃連解毒合犀角地黃然須與病家言過而用以此證雖藥十中僅救二三若黑色而下陷者必死也發斑雖禁下若大便祕躁渴色紫者可微下之若發斑已盡外勢已退內實不大便譫語小劑涼膈散或大柴胡微下之凡發斑紅赤者為胃熱紫為胃傷黑為胃爛也大抵鮮紅起發者吉雖大不妨稠密成片紫色者半死半生雜色青紫者十死不一生矣凡斑既出須得脈洪數有力身溫足暖者易治若脈小足冷元氣虛弱者難治狂言發斑大便自利或短氣燥結不通而黑斑如果實黶者皆不治附醫案三則許叔微治一人內寒外熱而發斑六脈沉細肩背胸脅斑出數點隨出隨隱旋更發出語言狂亂乃陽為陰逼上入於肺轉之皮毛故錯亂如狂非譫語也肌表雖熱以手按之須臾冷透如冰與薑附等藥數劑乃大汗而愈滑伯仁治一人身大熱脈沉實而滑四末微清以燈燭之遍體皆赤斑舌上苔黑而燥裂芒刺神昏譫語以小柴胡加知母石膏一夕連進三服次用大承氣下之而安呂滄州治一人脈虛自汗誤與真武湯遂至神昏時時熟睡脈伏不至而肌熱灼指此營熱致斑之候非陽病陰脈之比先與白虎加人參湯化其斑復以桃核承氣下之而愈周禹載曰發斑之證已致慎其下及用辛熱更無是理而病情之變復有如三案者可見病機不可執一妙在臨證化裁耳故附之以廣識見云春溫病論周禹載曰喻嘉言尚論篇闡發仲景傷寒論殊暢也醫門法律闡發金匱要略殊貫也雖皆有所粉本然學廣才張心靈筆古以各成其妙者也至尚論溫病云會內經之旨以發仲景不宣之祕且謂仲景略於治溫而法度錯出於治傷寒中因內經云冬傷於寒春必病溫此一大例也冬不藏精春必病溫此一大例也既冬傷於寒又冬不藏精至春月同時病發此一大例也奉此三例以論溫證而詳其治然後與仲景三陽三陰之例先後合符蓋冬傷於寒邪藏肌膚即邪中三陽之謂也冬不藏精邪入陰臟即邪中三陰之謂也嘉言之論如此豫謂溫病無陰陽之分也何也冬有溫氣先開發人之腠理而寒得以襲之所謂邪之所湊其氣必虛惟不藏精之人而後虛也虛則寒傷其經經必少陰者以少陰臟本虛也然所傷原微且冬月大水當令其權方盛微邪不敢抗衡但臥榻之側豈容他人鼾睡惟有阻彼生意暗爍精髓至於春時強木長而水不足以供其資始則當春而溫木旺水虧所郁升發火氣燔灼病溫而已矣其所傷者寒也所病者溫也所伏者少陰也所發者少陽也故病必有陽而無陰藥必用寒而遠熱黃芩湯其主治也則嘉言之論溫有陰有陽如傷寒三陰經可用辛熱者豫曰否否不然也又曰冬傷於寒春必病溫是言所感者本寒也王叔和云從立春節後其中無暴大寒又不冰雪有人壯熱為病者此屬春時陽氣發外冬時伏寒變為溫病此亦明言寒也變字大妙嘉言以為非豫獨以為確寒氣內伏郁久而發自成熱矣傷寒寒也暫襲營間不久而為大熱況遲之又久耶為熱乃自然之理但不言變不足以教天下也然何以不言熱而言溫以春行溫令故也如李明之所云冬傷於寒者冬行春令也當冬而溫火勝而水虧矣水既虧則所勝妄行土有餘也所生受病金不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病然由明之所言是冬溫而感之即病者也非伏寒也非變也不然必無冬溫一證也而後可既有冬溫則有是氣已有是證矣由其言以悉冬溫便可垂論不磨若論春溫不免貽昧千古矣經曰逆冬氣則少陰不藏不藏則寒邪得而入之傷於肌膚伏於骨髓始知冬為藏精之時惟逆冬氣遂使少陰之經氣不閉復遭非時之暖致令開泄忽然嚴寒驟返不免受傷故受傷者仍是寒邪也因先被溫令開泄似乎喜寒且所傷不甚故不即病而潛伏於少陰也然所以不病於冬而病於春者正因水在冬為旺時邪伏於經且俯首而不敢抗內郁既久已自成熱至行春令開發腠理陽氣外泄腎水內虧至春三月而木當生髮孰為鼓舞孰為滋養生化之源既絶木何賴以生乎身之所存者溫也時強木長故為溫病余故以彼論冬時之感溫非是而此論冬月之伏寒最精愚性甚拙何敢好議先賢但以為必如此方與冬溫兩不相阻且與仲景論溫熱必推本自始動曰傷寒之旨無悖云耳門人問曰傷者寒也何以病溫答曰傷寒非病寒乎而何以熱也寒鬱營間不一二日而成大熱況伏藏於內者數十日之久耶夫既邪傷肌肉何以得入少陰經中蓋惟不藏精則少陰先病故邪傷者少陰也春屬木則自內發出無論兼太陽或陽明總無不由少陽何也彼少陽行春令也然既從少陰矣何仲景專云太陽病蓋太陽與少陰相表裡也故以發熱為太陽也曰不惡寒明無表症也則其熱自內出無外邪郁之也然則仲景復言太少合病者見發熱不惡寒或兼有耳聾脅滿證也言三陽合病者以脈大屬陽明而多眠則熱聚於膽也不言法者總以黃芩湯為主治也乃嘉言復謂有發表三五次而外證不除攻裡三五次而里證不除以為在表也又似在裡以為在裡也又似在表此溫疫證感天地人濕氣熱氣尸氣邪入口鼻溷淆三焦者相近與春溫全不相涉也愚故及之以破後學之惑門人復問曰春溫亦間有一二表症者乎曰有之伏氣之病雖感於冬然安保風之傷人不在伏氣將發未發之時乎但兼外感者必先頭痛或惡寒而後熱不已此新邪引出舊邪來也或往來寒熱頭痛而嘔稍愈後渾身壯熱為病者此正氣又虛伏發更重也總之無外證者以黃芩湯為主治兼外感者必加柴胡或以本經藥輕解必無發汗之理故仲景云發汗已身灼熱者名曰風溫謂誤用辛熱之藥既辛散以劫其陰復增熱以助其陽遂使熱更熾脈俱浮有如此之危證也以及誤下誤火嚴加戒諭者舍黃芩湯別無治法也溫熱病脈論溫病熱病之脈或見浮緊者乃重感不正之暴寒寒邪束於外熱邪結於內故其脈外繃急而內洪盛也或不識脈形但見弦脈便呼為緊而妄治之蓋脈之盛而有力者每每兼弦豈可錯認為緊而誤以為寒乎夫溫熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫鬱在內故也其左手盛或浮者必有重感於風寒否則非溫熱病自是非時暴寒耳溫熱病亦有先見表證而後見里證者蓋怫鬱自內達外熱鬱腠理之時若不用辛涼發散則邪不得外泄遂還里而成可攻之證非如傷寒從表而始也或有不悟此理乃於春夏溫熱病而求浮緊之脈不亦疏乎溫病方五道黃芩湯黃芩加半夏生薑湯甘草湯桔梗湯黃連阿膠湯方俱見前附集方二十九道小承氣湯大黃四兩去皮厚朴二兩炙枳實三枚炙上三味以水四升煮取一升二合去滓分溫二服大承氣湯大黃四兩去皮酒洗芒硝三兩厚朴八兩炙枳實五枚炙上四味以水一斗先煮枳朴取五升去滓內大黃煮取二升去滓內芒硝更上微火一二沸溫再服調胃承氣湯大黃四兩清酒洗甘草二兩炙芒硝半升上三味㕮咀以水三升煮取一升去滓內芒硝更上微火煮令沸少少溫服之大柴胡湯柴胡八兩黃芩三兩半夏半升洗芍藥三兩枳實四枚炙生薑五兩切大棗十二枚擘大黃二兩去皮酒洗上八味以水一斗二升煮取六升去滓再煎溫服一升日三服雙解散麻黃去節防風當歸川芎薄荷芍藥連翹大黃酒洗芒硝各半兩石膏碎黃芩酒洗桔梗各一兩荊芥山梔白朮薑汁拌生用甘草各二兩炙滑石三兩上為散每服三錢加生薑三片水煎去滓溫服小柴胡湯柴胡八兩黃芩三兩人參三兩半夏八兩洗甘草三兩炙生薑三兩切大棗十二枚擘上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服梔子豉湯梔子十四枚擘生用香豉四合綿裹上二味以水四升先煮梔子得二升半內豉煮取一升半去滓分二服溫進一服益元散桂林滑石六兩生甘草一兩上為末每服三錢溫水或新汲水調服取汗加香豉薄荷安神加硃砂止泄加炮薑消斑加青黛涼膈散連翹梔子薄荷黃芩大黃各五錢酒洗芒硝二錢半甘草一兩半炙上為末每服五錢水一碗半煎一碗去滓入白蜜一匙微煎溫服一方無薄荷加芍藥大棗蔥白葛根蔥白湯葛根芍藥知母各一錢半川芎二錢生薑二片蔥白五寸連須上六味水煎溫服本方去知母加甘草大棗名增損葛根蔥白湯治感冒風寒頭痛三黃石膏湯黃連酒洗黃芩酒洗黃柏各二錢酒洗石膏五錢碎麻黃一錢去節泡梔子二十枚碎香豉一合生薑二片蔥白三莖上用地漿水澄清煎服半日許不得汗解再服如脈數便閉上氣喘急舌卷囊縮者去麻黃香豉加大黃芒硝捶法加細茶一撮葶藶苦酒湯葶藶三錢研搗取汁苦酒三合即米醋生艾汁一合如無干艾浸搗上水煎作三服探吐取汗黃連解毒湯黃連酒洗黃芩酒洗黃柏酒洗梔子各一錢半上四味水煎溫服無時葳蕤湯治風溫葳蕤一錢五分石膏二錢碎白薇麻黃去節泡川芎葛根羌活甘草炙杏仁去皮尖青木香各一錢上十味水煎日三服麻黃升麻湯治誤汗風溫須去二麻薑朮麻黃二兩半去節升麻一兩一分當歸一兩一分知母黃芩葳蕤各十八銖天門冬去心芍藥乾薑白朮茯苓甘草炙桂枝石膏各六銖碎綿裹上十四味以水一斗先煮麻黃一二沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三斗米頃令盡汗出愈栝蔞根湯治風溫無大熱而渴栝蔞根一錢石膏三錢碎葛根一錢五分防風人參甘草各五分炙上六味水煎溫服無時陽旦湯治冬溫桂枝三錢芍藥酒焙甘草各二錢炙黃芩二錢酒炒生薑三片大棗三枚擘上六味水煎溫服無時頭疼咳嗽咽痛下痢加桔梗茯苓寒食停滯加厚朴發熱畏寒加麻黃石膏升麻葛根湯升麻葛根芍藥酒洗甘草各一錢半炙上四味水煎溫服無時犀角黑參湯犀角鎊黑參各二錢升麻射干黃芩人參各一錢甘草八分上七味水煎溫服無時小柴胡去參半加栝蔞湯即前小柴胡湯去人參半夏加栝蔞根四兩黃芩加生薑湯即前黃芩湯加生薑一兩半白虎加人參湯方見後熱病以上三方治溫瘧白虎合黃連解毒湯即前黃連解毒湯合後白虎湯犀角大青湯犀角二錢鎊大青一錢五分黑參升麻黃連黃芩黃柏梔子各一錢甘草八分上水煎熱服無時如脈虛熱甚本方去芩柏升麻加人參生地柴胡名消斑青黛飲黃連解毒合犀角地黃湯黃連酒洗黃芩酒洗黃柏酒洗梔子各一錢半犀角磨水更佳鎊屑亦可生地黃酒浸搗牡丹皮芍藥各二錢上先以七味水煎去滓入地黃再煎數沸濾清加藕節汁側柏汁並磨好墨少許攪令黑服之調中飲蒼朮二錢泔水浸麻油炒白朮生厚朴薑汁炒陳皮甘草炙枳實炒神麯炒黃連各一錢薑汁炒山楂二錢薑汁炒草果八分炮薑五分上水煎去滓磨木香汁少許調服如腹痛加桃仁痛甚便祕加大黃口乾加省頭草理中去朮加附子藿香升麻橘皮湯人參甘草炙乾薑附子炮藿香升麻陳皮等分上水煎溫服無時補中益氣湯人參白朮炒黃耆炙甘草各一錢半炙當歸一錢陳皮五分升麻柴胡各三分上八味加薑棗水煎溫服通脈四逆湯甘草二兩炙乾薑三兩附子一枚生用去皮切八片上三味以水三升煮取一升二合去滓分溫再服其脈即出者愈面色赤者加蔥九莖腹中痛者去蔥加芍藥二兩嘔者加生薑二兩咽痛者去芍藥加桔梗一兩利止脈不出者去桔梗加人參二兩
